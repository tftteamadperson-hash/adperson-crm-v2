<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리워드 관리 — 분양의신 CRM</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script>(function(){var u=sessionStorage.getItem('crm_user');if(u){var uid=JSON.parse(u).id;if(localStorage.getItem('crm_light_'+uid)==='1')document.documentElement.setAttribute('data-theme','light');}})();</script>
<style>
:root{
  --bg:#080f1a;--bg2:#0d1623;--bg3:#111e30;--bg4:#162236;--bg5:#0a1828;
  --border:#1e3050;--border2:#2a3f60;
  --gold:#C9A84C;--gold-light:#F0D080;--gold-dim:rgba(201,168,76,.13);
  --text:#eaf0f8;--text2:#96aec8;--text3:#4d6480;
  --green:#2dd4a0;--red:#f06060;--blue:#5b9cf6;--purple:#a78bfa;--orange:#fb923c;
  --sidebar:220px;--radius:8px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px}

/* 사이드바 */
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto;scrollbar-width:none}
.sidebar::-webkit-scrollbar{display:none}
.sb-top{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo{height:28px;filter:drop-shadow(0 0 6px rgba(201,168,76,.4))}
.sb-brand{font-size:11px;font-weight:600;color:var(--gold-light);letter-spacing:.04em;line-height:1.3}
.sb-brand span{display:block;font-size:9px;font-weight:300;color:var(--text3)}
.sb-user{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1e4d8c,#0d2d5a);border:1.5px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--gold-light);flex-shrink:0;overflow:hidden}
.sb-av img{width:100%;height:100%;object-fit:cover}
.sb-uname{font-size:13px;font-weight:600}.sb-role{font-size:11px;color:var(--gold);font-weight:500}
.sb-nav{flex:1;padding:8px 0}
.sb-section{padding:10px 16px 4px;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.12em;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 16px;color:var(--text2);font-size:13px;cursor:pointer;transition:all .15s;border-left:2px solid transparent;text-decoration:none}
.sb-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.sb-item.active{background:var(--gold-dim);color:var(--gold-light);border-left-color:var(--gold);font-weight:600}
.sb-item .icon{font-size:14px;width:17px;text-align:center;flex-shrink:0}
.sb-coming{margin-left:auto;font-size:9px;color:var(--text3);background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px}
.sb-bottom{padding:10px 0;border-top:1px solid var(--border)}

/* 메인 */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;flex-shrink:0}
.page-title{font-size:16px;font-weight:700}
.page-desc{font-size:12px;color:var(--text3);margin-top:1px}

/* 상단 요약 카드 */
.sum-row{display:flex;gap:10px;padding:14px 24px 0;flex-shrink:0}
.sum-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;flex:1;display:flex;flex-direction:column;gap:4px}
.sc-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em}
.sc-val{font-size:22px;font-weight:700}
.sc-sub{font-size:11px;color:var(--text3)}
.sc-sub span{font-weight:600;color:var(--text2)}

/* 탭 + 필터바 */
.tab-bar{display:flex;align-items:center;gap:10px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.tabs{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:3px;flex-shrink:0}
.tab-btn{padding:7px 20px;border-radius:6px;font-family:'Pretendard',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .18s;border:none;background:transparent}
.tab-btn.active{background:var(--bg2);color:var(--text);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.fdiv{width:1px;height:22px;background:var(--border);margin:0 2px}
.fsel{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text);outline:none;cursor:pointer}
.fsel:focus{border-color:rgba(201,168,76,.4)}
.rbtn{padding:7px 13px;border-radius:20px;background:none;border:1px solid var(--border);font-family:'Pretendard',sans-serif;font-size:12px;color:var(--text3);cursor:pointer;transition:all .18s}
.rbtn:hover{border-color:var(--gold);color:var(--gold)}
.sw{position:relative;flex-shrink:0}
.sw input{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px 8px 30px;font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text);outline:none;width:200px}
.sw input:focus{border-color:rgba(201,168,76,.4)}
.sw input::placeholder{color:var(--text3)}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:11px;pointer-events:none}
.filter-info{margin-left:auto;font-size:12px;color:var(--text3)}
.filter-info strong{color:var(--text2)}

/* 테이블 */
.table-wrap{flex:1;overflow:auto;padding:0 24px 20px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.table-wrap::-webkit-scrollbar{width:4px;height:4px}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
table{width:100%;border-collapse:collapse;min-width:900px}
thead th{position:sticky;top:0;z-index:5;background:var(--bg2);border-bottom:2px solid var(--border);padding:10px 10px;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;text-align:center}
tbody tr{border-bottom:1px solid rgba(30,48,80,.5);cursor:pointer;transition:background .12s}
tbody tr:hover{background:rgba(255,255,255,.03)}
td{padding:12px 10px;font-size:13px;color:var(--text2);white-space:nowrap;text-align:center;vertical-align:middle}
.td-name{font-size:14px;font-weight:700;color:var(--text)}
.td-pos{color:var(--green);font-weight:700}
.td-neg{color:var(--red);font-weight:700}
.td-gold{color:var(--gold-light);font-weight:700}
.td-blue{color:var(--blue);font-weight:600}
.empty-row td{padding:48px;color:var(--text3);font-size:13px}

/* 배지 */
.badge{display:inline-flex;align-items:center;justify-content:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.b-qtr{background:rgba(91,156,246,.15);color:var(--blue)}
.b-paid{background:rgba(45,212,160,.15);color:var(--green);border:1px solid rgba(45,212,160,.25)}
.b-unpaid{background:rgba(240,96,96,.12);color:var(--red);border:1px solid rgba(240,96,96,.2)}
.b-reward{background:rgba(45,212,160,.12);color:var(--green)}
.b-mile{background:rgba(251,146,60,.12);color:var(--orange)}
.b-partial{background:rgba(201,168,76,.12);color:var(--gold-light);border:1px solid rgba(201,168,76,.2)}

/* 지급처리 버튼 */
.btn-pay{font-family:'Pretendard',sans-serif;font-size:11px;font-weight:700;padding:5px 12px;border-radius:6px;border:none;cursor:pointer;transition:all .18s}
.btn-pay.can-pay{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:#160d00}
.btn-pay.can-pay:hover{box-shadow:0 3px 10px rgba(201,168,76,.3)}
.btn-pay.paid{background:rgba(45,212,160,.15);color:var(--green);border:1px solid rgba(45,212,160,.25)}
.btn-mile{font-family:'Pretendard',sans-serif;font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;background:rgba(251,146,60,.12);border:1px solid rgba(251,146,60,.2);color:var(--orange);cursor:pointer;transition:all .18s}
.btn-mile:hover{background:rgba(251,146,60,.2)}

/* 모달 */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.mbg.on{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:540px;max-width:96vw;max-height:88vh;overflow-y:auto;padding:26px;transform:translateY(12px) scale(.98);transition:transform .3s ease;scrollbar-width:thin}
.mbg.on .modal{transform:none}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.modal::before{content:'';display:block;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin-bottom:18px;opacity:.5}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:16px;font-weight:700}
.mcl{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mcl:hover{background:rgba(255,255,255,.12)}

/* 모달 상세 정보 박스 */
.detail-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.drow{display:flex;flex-direction:column;gap:3px}
.dlabel{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.dval{font-size:14px;font-weight:600;color:var(--text)}

/* 모달 섹션 */
.msec{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.msec .dot{width:5px;height:5px;border-radius:50%}
.mform{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.mf{display:flex;flex-direction:column;gap:5px}
.mf.full{grid-column:1/-1}
.ml{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em}
.einput,.eselect,.etarea{font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 11px;outline:none;transition:border-color .2s;width:100%}
.einput:focus,.eselect:focus,.etarea:focus{border-color:rgba(201,168,76,.45)}
.einput::placeholder,.etarea::placeholder{color:var(--text3)}
.einput[readonly]{background:var(--bg4);color:var(--text2);cursor:default}
.etarea{resize:none;height:72px;line-height:1.7}
.chk-row{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.chk-box{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .18s}
.chk-row.checked .chk-box{background:var(--green);border-color:var(--green);color:#fff}
.chk-label{font-size:13px;font-weight:600;color:var(--text2)}
.auto-preview{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:7px;padding:10px 14px;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.ap-label{color:var(--text3);font-size:11px;font-weight:600}
.ap-val{font-size:16px;font-weight:700;color:var(--gold-light)}
.mfoot{display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.mcancel{flex:1;background:transparent;border:1px solid var(--border);border-radius:6px;padding:10px;font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text2);cursor:pointer}
.msubmit{flex:2;background:linear-gradient(135deg,var(--gold-light),var(--gold));color:#160d00;border:none;border-radius:6px;padding:10px;font-family:'Pretendard',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.mdel{font-family:'Pretendard',sans-serif;font-size:12px;padding:10px 14px;border-radius:6px;background:rgba(240,96,96,.1);border:1px solid rgba(240,96,96,.25);color:var(--red);cursor:pointer}

/* 누적 리워드 구간 표시 */
.tier-bar{height:6px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin-top:4px}
.tier-fill{height:100%;border-radius:4px;transition:width .8s ease}
.tier-1{background:linear-gradient(to right,var(--blue),#7ab4ff)}
.tier-2{background:linear-gradient(to right,var(--green),#6ee7b7)}
.tier-3{background:linear-gradient(to right,var(--gold),var(--gold-light))}

[data-theme="light"]{--bg:#eef2f7;--bg2:#fff;--bg3:#e4eaf2;--bg4:#d8e2ee;--border:#c0d0e0;--text:#0d1f36;--text2:#2a4060;--text3:#6080a0;--gold:#9a6800;--gold-light:#7a5200}
[data-theme="light"] .sidebar,[data-theme="light"] .sb-top,[data-theme="light"] .sb-user{background:#1a2a42 !important;border-color:#243858 !important}
[data-theme="light"] .sb-item{color:#a0bcd8 !important}
[data-theme="light"] .sb-item.active{background:rgba(201,168,76,.15) !important;color:var(--gold-light) !important}
[data-theme="light"] thead th,[data-theme="light"] .topbar,[data-theme="light"] .tab-bar{background:var(--bg2) !important}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-top">
    <img src="./logo-gold.png" class="sb-logo" alt="" onerror="this.style.display='none'">
    <div class="sb-brand">분양의신 CRM<span>광고인㈜ 대외협력팀</span></div>
  </div>
  <div class="sb-user">
    <div class="sb-av" id="sbUserAv">?</div>
    <div><div class="sb-uname" id="sbUserName">—</div><div class="sb-role" id="sbUserRole">—</div></div>
  </div>
  <nav class="sb-nav">
    <div class="sb-section">총괄</div>
    <a class="sb-item" href="dashboard.html"><span class="icon">📊</span>대시보드</a>
    <a class="sb-item" href="#" onclick="return false" style="opacity:.5;cursor:default"><span class="icon">📅</span>월간 실적<span class="sb-coming">준비중</span></a>
    <a class="sb-item" href="#" onclick="return false" style="opacity:.5;cursor:default"><span class="icon">📆</span>주간 실적<span class="sb-coming">준비중</span></a>
    <div class="sb-section">실행</div>
    <a class="sb-item" href="customers.html"><span class="icon">👥</span>고객 DB</a>
    <a class="sb-item" href="pipeline.html"><span class="icon">🔀</span>파이프라인</a>
    <a class="sb-item" href="#" onclick="return false" style="opacity:.5;cursor:default"><span class="icon">⭐</span>분양회 입회자<span class="sb-coming">준비중</span></a>
    <a class="sb-item" href="article.html"><span class="icon">📰</span>취재 · 아티클</a>
    <a class="sb-item" href="premium-agency.html"><span class="icon">🏢</span>프리미엄 대행사</a>
    <a class="sb-item" href="wanpan.html"><span class="icon">🚚</span>완판트럭</a>
    <div class="sb-section">운영</div>
    <a class="sb-item" href="#" onclick="return false" style="opacity:.5;cursor:default"><span class="icon">📋</span>매출일보<span class="sb-coming">준비중</span></a>
    <a class="sb-item" href="revenue.html"><span class="icon">💰</span>통합 매출 관리</a>
    <a class="sb-item active"><span class="icon">🎁</span>리워드 관리</a>
    <a class="sb-item" href="#" onclick="return false" style="opacity:.5;cursor:default"><span class="icon">👑</span>분양회 회원 관리<span class="sb-coming">준비중</span></a>
  </nav>
  <div class="sb-bottom">
    <a class="sb-item" id="lightModeBtn" onclick="toggleLightMode()" style="cursor:pointer"><span class="icon">🌙</span>라이트 모드</a>
    <a class="sb-item" id="menuAccessMgmt" href="admin-accounts.html"><span class="icon">⚙️</span>접근 권한</a>
    <a class="sb-item" href="mypage.html"><span class="icon">👤</span>마이페이지</a>
    <a class="sb-item" href="index.html"><span class="icon">🚪</span>로그아웃</a>
  </div>
</aside>

<div class="main">
  <div class="topbar" style="gap:10px">
    <span style="font-size:18px">🎁</span>
    <div><div class="page-title">리워드 관리</div><div class="page-desc">분기별 리워드 지급 및 마일리지 관리</div></div>
  </div>

  <!-- 상단 요약 카드 -->
  <div class="sum-row" id="sumRow"></div>

  <!-- 탭 + 필터 -->
  <div class="tab-bar">
    <div class="tabs">
      <button class="tab-btn active" id="tab-regular" onclick="setTab('regular')">📋 정기 리워드</button>
      <button class="tab-btn" id="tab-accum" onclick="setTab('accum')">📈 누적 리워드</button>
      <button class="tab-btn" id="tab-unpaid" onclick="setTab('unpaid')">⏰ 미지급 확인</button>
    </div>
    <div class="fdiv"></div>

    <div class="fdiv"></div>
    <select class="fsel" id="filterQuarter" onchange="doRender()">
      <option value="">전체 분기</option>
      <option value="1분기">1분기</option>
      <option value="2분기">2분기</option>
      <option value="3분기">3분기</option>

  <div class="table-wrap" id="tableWrap"></div>
</div>

<!-- 상세 팝업 모달 -->

  <div class="modal" id="modalInner"></div>

<script>
'use strict';

/* ── 라이트모드 ── */
function toggleLightMode(){
  var u=sessionStorage.getItem('crm_user'),uid=u?JSON.parse(u).id:'guest';
  var isLight=document.documentElement.getAttribute('data-theme')==='light';
  if(isLight){document.documentElement.removeAttribute('data-theme');localStorage.removeItem('crm_light_'+uid);}
  else{document.documentElement.setAttribute('data-theme','light');localStorage.setItem('crm_light_'+uid,'1');}
  var btn=document.getElementById('lightModeBtn');
  if(btn)btn.innerHTML=isLight?'<span class="icon">🌙</span>라이트 모드':'<span class="icon">☀️</span>다크 모드';
}
(function(){var btn=document.getElementById('lightModeBtn');if(btn&&document.documentElement.getAttribute('data-theme')==='light')btn.innerHTML='<span class="icon">☀️</span>다크 모드';})();

/* ── 세션 ── */
window.addEventListener('DOMContentLoaded',function(){
  var RANKS={adperson1:'본부장',adperson2:'팀장',adperson3:'파트장',adperson4:'메인',adperson5:'어쏘',adperson6:'어쏘',adperson7:'CX',adperson8:'어시',adperson9:'어시'};
  var ROLE_LABEL={admin:'관리자',exec:'실행파트',ops:'운영파트'};
  var ALLOWED=['adperson1','adperson2','adperson3','adperson8'];
  var u=sessionStorage.getItem('crm_user');
  if(!u){window.location.href='index.html';return;}
  var user=JSON.parse(u);
  var av=document.getElementById('sbUserAv'),nm=document.getElementById('sbUserName'),rl=document.getElementById('sbUserRole');
  if(nm)nm.textContent=user.name+(' '+(RANKS[user.id]||''));
  if(rl)rl.textContent=ROLE_LABEL[user.role]||'';
  if(av){var ph=sessionStorage.getItem('profile_photo_'+user.id);if(ph)av.innerHTML='<img src="'+ph+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';else av.textContent=user.name[0];}
  var menuEl=document.getElementById('menuAccessMgmt');

/* ── 포맷 ── */
function won(n){return(n||0).toLocaleString()+'원';}
function fmtDate(s){if(!s)return'—';var p=s.split('-');return p[0]+'.'+(+p[1])+'.'+(+p[2]);}
function calcPay(amount,exempt){return exempt?amount:Math.round(amount*0.967);}
function getTier(total){
  if(total>=100000000)return{tier:'3구간',reward:10000000,label:'1억↑ → 1,000만원'};
  if(total>=70000000)return{tier:'2구간',reward:5000000,label:'7천~1억 → 500만원'};
  if(total>=50000000)return{tier:'1구간',reward:3000000,label:'5천~7천 → 300만원'};
  return null;
}

/* ── 요약 카드 ── */
function renderSummary(){
  var q=document.getElementById('filterQuarter').value||null;
  var data=q?RRDATA.filter(function(d){return d.quarter===q;}):RRDATA;
  var totalReward=data.reduce(function(a,d){return a+(d.totalReward||0);},0);
  var totalMile=data.reduce(function(a,d){return a+(d.mileageTotal||0);},0);
  var totalPaid=data.reduce(function(a,d){return a+(d.isPaid?d.paidAmount:0);},0);
  var totalUnpaid=data.filter(function(d){return!d.isPaid&&d.totalReward>0;}).reduce(function(a,d){return a+calcPay(d.totalReward,d.withholdingExempt);},0);

  document.getElementById('sumRow').innerHTML=
    '<div class="sum-card"><div class="sc-label">'+qLabel+' 발생 리워드</div><div class="sc-val" style="color:var(--gold-light)">'+won(totalReward)+'</div><div class="sc-sub">대상 <span>'+data.filter(function(d){return d.totalReward>0;}).length+'명</span></div></div>'+
    '<div class="sum-card"><div class="sc-label">'+qLabel+' 발생 마일리지</div><div class="sc-val" style="color:var(--orange)">'+won(totalMile)+'</div><div class="sc-sub">원천징수 전 기준</div></div>'+
    '<div class="sum-card"><div class="sc-label">'+qLabel+' 리워드 지급완료</div><div class="sc-val" style="color:var(--green)">'+won(totalPaid)+'</div><div class="sc-sub">원천징수 반영 금액</div></div>'+

    html+='<div class="mf"><span class="ml">마일리지 사용일</span><input class="einput" id="m_useDate" type="date"></div>';
    html+='<div class="mf"><span class="ml">사용 금액</span><input class="einput" id="m_useAmt" type="number" placeholder="0"></div>';
    html+='<div class="mf full"><span class="ml">비고</span><textarea class="etarea" id="m_useNote" placeholder="어떤 광고에 사용했는지 등"></textarea></div>';
    html+='<div class="mf full"><button class="btn-mile" onclick="saveMileageUse('+d.id+')">마일리지 사용 처리</button></div>';
    html+='</div>';
  }

  /* 지급처리 */
  html+='<div class="msec"><span class="dot" style="background:var(--gold)"></span>지급 처리</div>';
  html+='<div class="mform">';
  html+='<div class="mf full">';
  html+='<div class="auto-preview"><div><div class="ap-label">지급가능액 (원천징수 3.3% 차감)</div><div class="ap-val" id="payPreview">'+won(payable)+'</div></div><div><div class="chk-row'+(d.withholdingExempt?' checked':'')+'" id="exemptChk" onclick="toggleExempt('+rewardBase+')">'
    +'<div class="chk-box">'+(d.withholdingExempt?'✓':'')+'</div>'
    +'<span class="chk-label" style="font-size:11px;color:var(--text3)">원천징수 예외</span>'
    +'</div></div></div>'
  +'</div>';
  html+='<div class="mf"><span class="ml">지급일</span><input class="einput" id="p_date" type="date" value="'+(d.paidDate||'')+'"'+(d.isPaid?' readonly':'')+'></div>';
  html+='<div class="mf"><span class="ml">지급 금액</span><input class="einput" id="p_amount" type="number" value="'+(d.paidAmount||payable)+'"'+(d.isPaid?' readonly':'')+'></div>';
  html+='<div class="mf full"><span class="ml">비고</span><textarea class="etarea" id="p_note">'+(d.paidNote||'')+'</textarea></div>';
  if(d.isPaid){
    html+='<div class="mf full" style="padding:10px 14px;background:rgba(45,212,160,.08);border:1px solid rgba(45,212,160,.2);border-radius:7px;display:flex;align-items:center;gap:8px"><span style="font-size:14px">✅</span><span style="color:var(--green);font-weight:600">'+fmtDate(d.paidDate)+' 지급 완료 · '+won(d.paidAmount)+'</span></div>';
    html+='<div class="mf full"><button onclick="undoPay(\''+type+'\','+d.id+')" style="font-family:Pretendard,sans-serif;font-size:12px;padding:8px;background:rgba(240,96,96,.1);border:1px solid rgba(240,96,96,.2);border-radius:6px;color:var(--red);cursor:pointer;width:100%">지급 취소</button></div>';
  }
  html+='</div>';
  if(!d.isPaid){
    html+='<div class="mfoot"><button class="mcancel" onclick="closeModal()">닫기</button><button class="msubmit" onclick="savePay(\''+type+'\','+d.id+')">지급 완료 처리</button></div>';
  } else {
    html+='<div class="mfoot"><button class="msubmit" onclick="closeModal()">확인</button></div>';
  }
  document.getElementById('modalInner').innerHTML=html;
  document.getElementById('modalBg').classList.add('on');
}

/* ── 원천징수 예외 토글 ── */
function toggleExempt(rewardBase){
  var chk=document.getElementById('exemptChk');
  var isEx=chk.classList.contains('checked');
  chk.classList.toggle('checked');
  chk.querySelector('.chk-box').textContent=isEx?'':'✓';
  var newPayable=isEx?calcPay(rewardBase,false):rewardBase;
  document.getElementById('payPreview').textContent=won(newPayable);
  document.getElementById('p_amount').value=newPayable;
}

/* ── 마일리지 사용 처리 ── */
function saveMileageUse(id){
  var d=RRDATA.find(function(x){return x.id===id;});if(!d)return;
  var useAmt=parseInt(document.getElementById('m_useAmt').value)||0;
  var useDate=document.getElementById('m_useDate').value;
  var useNote=document.getElementById('m_useNote').value;
  if(!useDate||!useAmt){alert('사용일과 금액을 입력해주세요.');return;}
  if(useAmt>(d.mileageTotal-(d.mileageUsed||0))){alert('잔여 마일리지를 초과합니다.');return;}
  d.mileageUsed=(d.mileageUsed||0)+useAmt;
  d.mileageNote=(d.mileageNote?d.mileageNote+'\n':'')+'['+useDate+'] '+useAmt.toLocaleString()+'원 사용'+(useNote?' ('+useNote+')':'');
  saveRR(RRDATA);
  closeModal();
  doRender();
}

/* ── 지급 처리 ── */
function savePay(type, id){
  var data=type==='regular'?RRDATA:ARDATA;
  var d=data.find(function(x){return x.id===id;});if(!d)return;
  var pDate=document.getElementById('p_date').value;
  var pAmt=parseInt(document.getElementById('p_amount').value)||0;
  var pNote=document.getElementById('p_note').value;
  var exempt=document.getElementById('exemptChk').classList.contains('checked');
  if(!pDate||!pAmt){alert('지급일과 금액을 입력해주세요.');return;}
  d.paidDate=pDate; d.paidAmount=pAmt; d.paidNote=pNote; d.isPaid=true; d.withholdingExempt=exempt;
  if(type==='regular')saveRR(RRDATA);else saveAR(ARDATA);
  closeModal();doRender();
}

function undoPay(type,id){
  if(!confirm('지급 완료를 취소하시겠습니까?'))return;
  var data=type==='regular'?RRDATA:ARDATA;
  var d=data.find(function(x){return x.id===id;});if(!d)return;
  d.isPaid=false;d.paidDate='';d.paidAmount=0;
  if(type==='regular')saveRR(RRDATA);else saveAR(ARDATA);
  closeModal();doRender();
}

function closeModal(){document.getElementById('modalBg').classList.remove('on');}

/* ── 초기화 ── */
doRender();
</script>
</body>
</html>
