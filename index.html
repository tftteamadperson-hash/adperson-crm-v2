<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>분양의신 VIP Membership CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Noto+Sans+KR:wght@300;400;700&family=Montserrat:wght@200;300;400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C9A84C;--gold-light:#F0D080;--white:#FFFFFF;--black:#000000;--dark:#060400}
html,body{width:100%;height:100%;overflow:hidden;background:var(--black);cursor:none}

#cur{position:fixed;width:8px;height:8px;border-radius:50%;background:var(--gold-light);box-shadow:0 0 10px 3px rgba(240,208,128,.7);pointer-events:none;transform:translate(-50%,-50%);z-index:9999;transition:transform .08s}
#cur-ring{position:fixed;width:32px;height:32px;border-radius:50%;border:1px solid rgba(201,168,76,.4);pointer-events:none;transform:translate(-50%,-50%);z-index:9998}

#canvas{position:fixed;inset:0;z-index:0;opacity:0;transition:opacity 1.8s ease}
#canvas.show{opacity:1}

/* INTRO */
#intro{position:fixed;inset:0;z-index:50;background:var(--black);display:flex;align-items:center;justify-content:center;transition:opacity 1.2s ease}
#intro.hide{opacity:0;pointer-events:none}
.intro-word{display:flex;gap:.06em;font-family:'Montserrat',sans-serif;font-weight:900;font-size:clamp(44px,7.5vw,96px);letter-spacing:.2em}
.intro-letter{display:inline-block;color:var(--white);opacity:0;transform:translateY(16px);transition:opacity .35s ease,transform .35s ease,color .4s ease,text-shadow .4s ease}
.intro-letter.in{opacity:1;transform:translateY(0)}
.intro-letter.gold{color:var(--gold-light);text-shadow:0 0 30px rgba(201,168,76,.8),0 0 60px rgba(201,168,76,.3)}

/* MAIN */
#main{position:fixed;inset:0;z-index:10;opacity:0;transition:opacity 1.2s ease;pointer-events:none}
#main.show{opacity:1;pointer-events:all}

header{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:22px 32px;z-index:20}
.logo-block{display:flex;align-items:center;gap:12px}
.logo-icon{width:46px;height:46px;background:linear-gradient(135deg,#1a2a4a,#0d1520);border:1px solid rgba(201,168,76,.35);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-weight:900;font-size:9px;color:var(--gold-light);letter-spacing:.04em;line-height:1.3;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,.5)}
.logo-text-wrap{display:flex;flex-direction:column;gap:2px}
.logo-title{font-family:'Montserrat',sans-serif;font-weight:700;font-size:16px;color:var(--white);letter-spacing:.08em}
.logo-title em{font-style:normal;color:var(--gold-light)}
.logo-dept{font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:300;color:rgba(255,255,255,.4);letter-spacing:.1em}
.btn-access{font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:400;color:rgba(255,255,255,.8);background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.3);padding:10px 26px;border-radius:3px;cursor:none;letter-spacing:.12em;transition:all .3s ease;backdrop-filter:blur(10px)}
.btn-access:hover{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold-light);box-shadow:0 0 20px rgba(201,168,76,.15)}

.hero{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;padding-bottom:30px}
.hero-title{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(50px,7.5vw,104px);color:var(--white);text-align:center;line-height:1;text-shadow:0 2px 40px rgba(0,0,0,.4);animation:fadeUp 1s .3s ease both}
.hero-sub{font-family:'Montserrat',sans-serif;font-weight:200;font-size:clamp(10px,1.1vw,13px);letter-spacing:.42em;color:rgba(255,255,255,.4);margin-top:20px;animation:fadeUp 1s .55s ease both}
.hero-line{width:1px;height:38px;background:linear-gradient(to bottom,transparent,rgba(201,168,76,.5),transparent);margin-top:26px;animation:fadeUp 1s .7s ease both}

/* TAGLINE */
.tagline-wrap{position:absolute;bottom:60px;left:40px;width:520px;z-index:10;min-height:120px}
.tagline-slot{position:absolute;bottom:0;left:0;opacity:0;transform:translateY(12px);transition:opacity .75s ease,transform .75s ease;pointer-events:none;width:100%}
.tagline-slot.active{opacity:1;transform:translateY(0);pointer-events:all;position:relative}
.tl-main{font-family:'Playfair Display',serif;font-size:clamp(20px,2.5vw,33px);color:var(--white);line-height:1.25}
.tl-main strong{font-weight:700;font-style:italic}
.tl-main em{font-style:normal;color:var(--gold-light)}
.tl-desc{font-family:'Noto Sans KR',sans-serif;font-size:11.5px;font-weight:300;color:rgba(255,255,255,.42);margin-top:10px;line-height:1.9;letter-spacing:.04em}

.tl-dots{position:absolute;bottom:18px;left:40px;display:flex;gap:8px;z-index:10}
.tl-dot{width:18px;height:2px;border-radius:2px;background:rgba(255,255,255,.2);transition:background .4s,width .4s;cursor:none}
.tl-dot.active{background:var(--gold);width:32px}
.tl-progress{position:absolute;bottom:12px;left:40px;height:1px;background:rgba(201,168,76,.12);width:170px;border-radius:1px;z-index:10;overflow:hidden}
.tl-progress-fill{height:100%;background:var(--gold);width:0%;border-radius:1px}

footer{position:absolute;bottom:14px;left:40px;font-family:'Noto Sans KR',sans-serif;font-size:10px;color:rgba(255,255,255,.2);z-index:10;letter-spacing:.06em}
.side-hint{position:absolute;right:36px;bottom:48px;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:10;animation:fadeIn 2s 1.5s ease both;opacity:0}
.side-hint span{font-family:'Montserrat',sans-serif;font-size:8px;letter-spacing:.22em;color:rgba(255,255,255,.25);writing-mode:vertical-rl}
.side-line{width:1px;height:50px;background:linear-gradient(to bottom,rgba(201,168,76,.5),transparent);animation:linePulse 2.5s ease-in-out infinite}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s ease}
.overlay.on{opacity:1;pointer-events:all}
.modal{background:rgba(8,14,24,.97);border:1px solid rgba(201,168,76,.2);border-radius:12px;padding:44px 40px 36px;width:420px;max-width:92vw;position:relative;box-shadow:0 0 100px rgba(0,0,0,.8),0 0 40px rgba(201,168,76,.06);transform:translateY(22px) scale(.98);transition:transform .4s ease}
.overlay.on .modal{transform:translateY(0) scale(1)}
.modal::before{content:'';position:absolute;top:0;left:40px;right:40px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:.6}
.modal-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px}
.modal-logo-row{display:flex;flex-direction:column;gap:3px}
.modal-brand{font-family:'Montserrat',sans-serif;font-weight:700;font-size:15px;color:var(--gold-light);letter-spacing:.08em}
.modal-brand span{color:rgba(255,255,255,.5)}
.modal-org-text{font-family:'Noto Sans KR',sans-serif;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.08em}
.modal-close{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);font-size:12px;cursor:none;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:rgba(255,255,255,.12);color:var(--white)}
.modal-ttl{font-family:'Noto Sans KR',sans-serif;font-size:21px;font-weight:700;color:var(--white);margin-bottom:6px}
.modal-sub{font-family:'Noto Sans KR',sans-serif;font-size:12px;color:rgba(255,255,255,.3);margin-bottom:28px;letter-spacing:.04em}
.fg{margin-bottom:16px}
.fl{font-family:'Noto Sans KR',sans-serif;font-size:11px;color:rgba(255,255,255,.4);display:block;margin-bottom:7px;letter-spacing:.06em}
.fi-wrap{position:relative}
.fi{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:6px;padding:13px 16px;font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--white);outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:.04em}
.fi::placeholder{color:rgba(255,255,255,.18)}
.fi:focus{border-color:rgba(201,168,76,.45);box-shadow:0 0 0 3px rgba(201,168,76,.07)}
.pw-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-family:'Noto Sans KR',sans-serif;font-size:11px;color:rgba(255,255,255,.3);cursor:none;transition:color .2s}
.pw-btn:hover{color:rgba(255,255,255,.65)}
.btn-login{width:100%;padding:15px;margin-top:10px;background:linear-gradient(135deg,var(--gold-light),var(--gold));color:#1a0f00;border:none;border-radius:6px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;letter-spacing:.1em;cursor:none;transition:all .25s ease;box-shadow:0 4px 20px rgba(201,168,76,.2)}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,168,76,.35)}
.btn-login:active{transform:translateY(0)}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.fi.err{border-color:rgba(255,80,80,.5);animation:shake .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes linePulse{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="cur"></div>
<div id="cur-ring"></div>

<div id="intro"><div class="intro-word" id="introWord"></div></div>

<div id="main">
  <header>
    <div class="logo-block">
      <div class="logo-icon">분양<br>의신</div>
      <div class="logo-text-wrap">
        <div class="logo-title">분양의신 <em>·</em> CRM</div>
        <div class="logo-dept">광고인㈜ 대외협력팀</div>
      </div>
    </div>
    <button class="btn-access" onclick="openModal()">시스템 접속</button>
  </header>
  <div class="hero">
    <h1 class="hero-title">VIP Membership</h1>
    <p class="hero-sub">BUNYANGOE &nbsp;·&nbsp; CRM SYSTEM</p>
    <div class="hero-line"></div>
  </div>
  <div class="tagline-wrap" id="taglineWrap"></div>
  <div class="tl-dots" id="tlDots"></div>
  <div class="tl-progress"><div class="tl-progress-fill" id="tlFill"></div></div>
  <footer>© 2026 광고인㈜ · 분양의신 · All rights reserved.</footer>
  <div class="side-hint"><span>ENTER SYSTEM</span><div class="side-line"></div></div>
</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-logo-row">
        <div class="modal-brand">분양의신 <span>·</span> CRM</div>
        <div class="modal-org-text">광고인㈜ 대외협력팀</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-ttl">CRM 시스템 접속</div>
    <div class="modal-sub">아이디와 비밀번호를 입력하세요</div>
    <div class="fg"><label class="fl">아이디</label><div class="fi-wrap"><input class="fi" id="idInput" type="text" placeholder="아이디 입력" autocomplete="username"></div></div>
    <div class="fg"><label class="fl">비밀번호</label><div class="fi-wrap"><input class="fi" id="pwInput" type="password" placeholder="비밀번호 입력" autocomplete="current-password"><span class="pw-btn" onclick="togglePw()">보기</span></div></div>
    <button class="btn-login" onclick="handleLogin()">로그인</button>
  </div>
</div>

<script>
// CURSOR
const cur=document.getElementById('cur'),ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px'});
(function ar(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(ar)})();
document.addEventListener('mousedown',()=>{cur.style.transform='translate(-50%,-50%) scale(.5)'});
document.addEventListener('mouseup',()=>{cur.style.transform='translate(-50%,-50%) scale(1)'});

// PARTICLES
const cv=document.getElementById('canvas'),ctx=cv.getContext('2d');
let W,H,pts=[];
function rsz(){W=cv.width=innerWidth;H=cv.height=innerHeight}
rsz();window.addEventListener('resize',rsz);
class P{
  constructor(m){this.reset(m)}
  reset(m){
    if(m){this.x=mx+(Math.random()-.5)*28;this.y=my+(Math.random()-.5)*28;this.r=Math.random()*2.5+.8;this.life=1;this.decay=.03+Math.random()*.02;this.vx=(Math.random()-.5)*1.2;this.vy=-(Math.random()*1.2+.3);this.m=true}
    else{this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*16+3;this.br=this.r;this.life=Math.random();this.decay=.0012+Math.random()*.0025;this.vx=(Math.random()-.5)*.2;this.vy=-(Math.random()*.28+.04);this.h=36+(Math.random()-.5)*18;this.s=52+Math.random()*28;this.b=52+Math.random()*28;this.m=false}
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;if(!this.m)this.r=this.br*(.55+.45*Math.sin(this.life*Math.PI));if(this.life<=0){if(this.m)this.dead=true;else{this.reset(false);this.y=H+this.r;this.life=1}}if(!this.m&&this.y+this.r<0){this.reset(false);this.y=H+this.r}}
  draw(){
    ctx.save();
    if(this.m){const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*2.5);g.addColorStop(0,`rgba(240,208,128,${this.life*.85})`);g.addColorStop(1,'rgba(201,168,76,0)');ctx.beginPath();ctx.arc(this.x,this.y,this.r*2.5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill()}
    else{const a=this.life*.5;const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);g.addColorStop(0,`hsla(${this.h},${this.s}%,${this.b}%,${a})`);g.addColorStop(.45,`hsla(${this.h},${this.s-10}%,${this.b-12}%,${a*.45})`);g.addColorStop(1,`hsla(${this.h},40%,25%,0)`);ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill()}
    ctx.restore();
  }
}
for(let i=0;i<90;i++)pts.push(new P(false));
let ls=0;
document.addEventListener('mousemove',()=>{const n=Date.now();if(n-ls>28){for(let i=0;i<2;i++)pts.push(new P(true));ls=n}});
function loop(){ctx.fillStyle='rgba(6,4,0,1)';ctx.fillRect(0,0,W,H);const vg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.75);vg.addColorStop(0,'rgba(18,12,0,0)');vg.addColorStop(1,'rgba(2,1,0,.78)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);pts=pts.filter(p=>!p.dead);pts.forEach(p=>{p.update();p.draw()});requestAnimationFrame(loop)}
loop();

// INTRO
const WORD='FIRST MOVER';
const GOLD=[6,7,8,9,10];
const iw=document.getElementById('introWord');
WORD.split('').forEach((ch,i)=>{const el=document.createElement('span');el.className='intro-letter';el.textContent=ch===' '?'\u00A0':ch;el.dataset.i=i;iw.appendChild(el)});
const ltrs=[...iw.querySelectorAll('.intro-letter')];
function runIntro(){
  ltrs.forEach((el,i)=>{if(el.textContent==='\u00A0')return;setTimeout(()=>el.classList.add('in'),i*75+200)});
  GOLD.forEach((idx,j)=>{setTimeout(()=>ltrs[idx]?.classList.add('gold'),ltrs.length*75+500+j*55)});
  setTimeout(()=>document.getElementById('canvas').classList.add('show'),ltrs.length*75+1100);
  setTimeout(()=>{document.getElementById('intro').classList.add('hide');document.getElementById('main').classList.add('show');startTaglines()},ltrs.length*75+2100);
}
setTimeout(runIntro,400);

// TAGLINES
const TL=[
  {main:'<strong>First Mover</strong> in Real<br>Estate Sales',desc:'분양 산업의 판도를 바꾸는 새로운 기준.<br>대한민국 분양 생태계를 선도하는 퍼스트무버, 분양의신.'},
  {main:'<em>Exclusive</em> VIP<br>Membership for the Top 1%',desc:'광고를 넘어, 성장을 함께하는 프라이빗 파트너십.<br>분양상담사 최상위 100인만을 위한 멤버십, 분양회.'},
  {main:'<strong>올인원</strong> 분양 파트너<br>Platform & Community',desc:'하이타겟·LMS·호갱노노를 하나로.<br>분양의신이 만드는 대한민국 최초 분양 올인원 생태계.'}
];
const wrap=document.getElementById('taglineWrap'),dotsEl=document.getElementById('tlDots'),fill=document.getElementById('tlFill');
let ti=0,tlTmr=null;
const DUR=4500;
function buildTL(){
  TL.forEach((t,i)=>{
    const el=document.createElement('div');el.className='tagline-slot'+(i===0?' active':'');
    el.innerHTML=`<div class="tl-main">${t.main}</div><div class="tl-desc">${t.desc}</div>`;
    wrap.appendChild(el);
    const d=document.createElement('div');d.className='tl-dot'+(i===0?' active':'');d.onclick=()=>goTo(i);dotsEl.appendChild(d);
  });
}
function goTo(idx){
  const slots=[...wrap.querySelectorAll('.tagline-slot')];
  const dots=[...dotsEl.querySelectorAll('.tl-dot')];
  slots[ti].classList.remove('active');dots[ti].classList.remove('active');
  ti=idx;
  slots[ti].classList.add('active');dots[ti].classList.add('active');
  resetProg();
}
function resetProg(){
  fill.style.transition='none';fill.style.width='0%';
  clearTimeout(tlTmr);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{fill.style.transition=`width ${DUR}ms linear`;fill.style.width='100%'}));
  tlTmr=setTimeout(()=>goTo((ti+1)%TL.length),DUR);
}
function startTaglines(){buildTL();resetProg()}

// MODAL
function openModal(){document.getElementById('overlay').classList.add('on');setTimeout(()=>document.getElementById('idInput').focus(),400)}
function closeModal(){document.getElementById('overlay').classList.remove('on')}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal()}
function togglePw(){const el=document.getElementById('pwInput');el.type=el.type==='password'?'text':'password'}
function handleLogin(){
  const id=document.getElementById('idInput'),pw=document.getElementById('pwInput');
  let ok=true;
  if(!id.value.trim()){id.classList.add('err');setTimeout(()=>id.classList.remove('err'),400);ok=false}
  if(!pw.value){pw.classList.add('err');setTimeout(()=>pw.classList.remove('err'),400);ok=false}
  if(!ok)return;
  alert('로그인 기능은 추후 연결 예정입니다.');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){if(document.getElementById('overlay').classList.contains('on'))handleLogin();else if(document.getElementById('main').classList.contains('show'))openModal()}
  if(e.key==='Escape')closeModal();
});
</script>
</body>
</html>
