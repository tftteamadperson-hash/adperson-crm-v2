<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파이프라인 — 분양의신 CRM</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
:root{
  --bg:#080f1a;--bg2:#0d1623;--bg3:#111e30;--bg4:#162236;--bg5:#0a1828;
  --border:#1e3050;--border2:#2a3f60;
  --gold:#C9A84C;--gold-light:#F0D080;--gold-dim:rgba(201,168,76,.13);
  --text:#eaf0f8;--text2:#96aec8;--text3:#4d6480;
  --green:#2dd4a0;--red:#f06060;--blue:#5b9cf6;--purple:#a78bfa;--orange:#fb923c;
  --sidebar:220px;--radius:8px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px}

/* ── 사이드바 ── */
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto;scrollbar-width:none}
.sidebar::-webkit-scrollbar{display:none}
.sb-top{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo{height:28px;width:auto;filter:drop-shadow(0 0 6px rgba(201,168,76,.4))}
.sb-brand{font-size:11px;font-weight:600;color:var(--gold-light);letter-spacing:.04em;line-height:1.3}
.sb-brand span{display:block;font-size:9px;font-weight:300;color:var(--text3)}
.sb-user{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-avatar-sm{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1e4d8c,#0d2d5a);border:1.5px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--gold-light);flex-shrink:0}
.sb-uname{font-size:13px;font-weight:600}
.sb-role{font-size:11px;color:var(--gold);font-weight:500}
.sb-nav{flex:1;padding:8px 0}
.sb-section{padding:10px 16px 4px;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.12em;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 16px;color:var(--text2);font-size:13px;cursor:pointer;transition:all .15s;border-left:2px solid transparent;text-decoration:none}
.sb-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.sb-item.active{background:var(--gold-dim);color:var(--gold-light);border-left-color:var(--gold);font-weight:600}
.sb-item .icon{font-size:14px;width:17px;text-align:center;flex-shrink:0}
.sb-bottom{padding:10px 0;border-top:1px solid var(--border)}

/* ── 메인 ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:10px}
.page-title{font-size:16px;font-weight:700}
.page-desc{font-size:12px;color:var(--text3);margin-top:1px}
.realtime{font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px}
.realtime::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* 필터바 */
.filter-bar{display:flex;align-items:center;gap:8px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.search-wrap{position:relative;width:220px;flex-shrink:0}
.search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px 8px 30px;font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:rgba(201,168,76,.4)}
.search-wrap input::placeholder{color:var(--text3)}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:11px;pointer-events:none}
.fdivider{width:1px;height:22px;background:var(--border);margin:0 4px}
.exec-btns{display:flex;gap:6px}
.exec-btn{padding:7px 16px;border-radius:20px;font-family:'Pretendard',sans-serif;font-size:13px;font-weight:500;cursor:pointer;background:var(--bg3);border:1px solid var(--border);color:var(--text2);transition:all .18s}
.exec-btn:hover{border-color:var(--border2);color:var(--text)}
.exec-btn.active{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold-light);font-weight:600}
.reset-btn{padding:7px 13px;border-radius:20px;background:none;border:1px solid var(--border);font-family:'Pretendard',sans-serif;font-size:12px;color:var(--text3);cursor:pointer;transition:all .18s}
.reset-btn:hover{border-color:var(--gold);color:var(--gold)}
.total-info{margin-left:auto;font-size:12px;color:var(--text3)}
.total-info strong{color:var(--text2);font-weight:600}

/* ── 칸반 보드: 5컬럼 균등 분배 ── */
.board-wrap{flex:1;overflow-x:auto;overflow-y:hidden;padding:16px 24px;display:flex;gap:12px}
.col{
  flex:1;min-width:200px;max-width:320px;
  display:flex;flex-direction:column;
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;
}
.col-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.col-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700}
.col-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.col-count{font-size:12px;font-weight:700;padding:3px 9px;border-radius:10px;min-width:24px;text-align:center}
.col-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.col-body::-webkit-scrollbar{width:3px}
.col-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.empty-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 10px;color:var(--text3);font-size:12px;gap:8px;opacity:.5;text-align:center}

/* 컬럼 색상 */
.col-meeting{border-top:2px solid var(--blue)}
.col-done{border-top:2px solid var(--green)}
.col-book{border-top:2px solid var(--purple)}
.col-doc{border-top:2px solid var(--orange)}
.col-manage{border-top:2px solid var(--gold)}
.dot-meeting{background:var(--blue)}.dot-done{background:var(--green)}.dot-book{background:var(--purple)}.dot-doc{background:var(--orange)}.dot-manage{background:var(--gold-light)}
.cnt-meeting{background:rgba(91,156,246,.15);color:var(--blue)}
.cnt-done{background:rgba(45,212,160,.15);color:var(--green)}
.cnt-book{background:rgba(167,139,250,.15);color:var(--purple)}
.cnt-doc{background:rgba(251,146,60,.15);color:var(--orange)}
.cnt-manage{background:rgba(240,208,128,.15);color:var(--gold-light)}

/* ── 카드 ── */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:default;transition:border-color .18s,box-shadow .18s}
.card:hover{border-color:var(--border2);box-shadow:0 3px 12px rgba(0,0,0,.25)}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.card-info{flex:1}
.card-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.3}
.card-rank{font-size:12px;font-weight:400;color:var(--text3);margin-left:4px}
.card-sub{font-size:12px;color:var(--text3);margin-top:2px}
.card-detail-btn{font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.card-detail-btn:hover{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold-light)}
.card-stage{margin-bottom:8px}
.card-meta{display:flex;flex-direction:column;gap:5px;margin-bottom:9px}
.card-meta-row{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)}
.micon{font-size:11px;color:var(--text3);width:14px;text-align:center;flex-shrink:0}
.card-date{color:var(--blue);font-weight:600}
.note-preview{background:var(--bg5);border:1px solid var(--border);border-radius:5px;padding:7px 9px;margin-bottom:7px}
.note-prev-item{font-size:12px;color:var(--text2);line-height:1.6;display:flex;gap:5px;overflow:hidden}
.note-prev-date{color:var(--text3);flex-shrink:0;font-size:11px}
.note-prev-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.note-prev-more{font-size:11px;color:var(--text3);margin-top:3px}
.card-note-btn{width:100%;text-align:left;font-family:'Pretendard',sans-serif;font-size:12px;font-weight:500;color:var(--text3);background:none;border:none;cursor:pointer;padding:5px 0 0;transition:color .15s}
.card-note-btn:hover{color:var(--gold-light)}

/* 배지 */
.badge{display:inline-flex;align-items:center;justify-content:center;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.b-prospect{background:rgba(251,146,60,.12);color:var(--orange)}
.b-deal{background:rgba(91,156,246,.12);color:var(--blue);font-weight:600}
.b-retain{background:rgba(45,212,160,.12);color:var(--green);font-weight:600}
.b-lead{color:var(--text3);font-size:10px}
.b-tm-high{background:rgba(240,96,96,.16);color:var(--red);font-weight:700}
.b-type-old{background:rgba(91,156,246,.12);color:var(--blue)}
.b-type-new{background:rgba(45,212,160,.12);color:var(--green)}
.b-type-ref{background:rgba(167,139,250,.12);color:var(--purple)}

/* ── 상세 오버레이 (풀스크린) ── */
.detail-overlay{
  position:absolute;inset:0;
  background:var(--bg);
  z-index:200;
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
.detail-overlay.open{transform:translateX(0)}

/* 상세 헤더 */
.detail-topbar{
  height:56px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;padding:0 24px;
  flex-shrink:0;
}
.back-btn{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  color:var(--text2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
.back-btn:hover{background:rgba(255,255,255,.12);color:var(--text)}
.detail-avatar{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#fff;flex-shrink:0;
}
.detail-name{font-size:18px;font-weight:700;color:var(--text)}
.detail-rank{font-size:13px;color:var(--text3);margin-left:6px}
.detail-type-badge{margin-left:10px}
.detail-topbar-right{margin-left:auto;display:flex;gap:8px}
.edit-toggle-btn{
  font-family:'Pretendard',sans-serif;font-size:12px;font-weight:600;
  padding:7px 16px;border-radius:6px;
  background:var(--gold-dim);border:1px solid rgba(201,168,76,.3);
  color:var(--gold-light);cursor:pointer;transition:all .2s;
}
.edit-toggle-btn:hover{background:rgba(201,168,76,.2)}

/* 상세 바디 */
.detail-body{flex:1;overflow-y:auto;padding:24px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.detail-body::-webkit-scrollbar{width:4px}
.detail-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* 카드 그리드 */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:900px;margin:0 auto}
.detail-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px 22px}
.detail-card.full{grid-column:1/-1}
.dc-title{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:7px}
.dc-title .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dc-title .edit-hint{font-size:10px;color:var(--gold);background:var(--gold-dim);padding:2px 8px;border-radius:10px;font-weight:500;text-transform:none;letter-spacing:0}

/* 정보 행 */
.info-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid rgba(30,48,80,.5)}
.info-row:last-child{border-bottom:none}
.info-label{font-size:12px;color:var(--text3);width:100px;flex-shrink:0}
.info-val{font-size:13px;color:var(--text);font-weight:500;flex:1;display:flex;align-items:center;gap:6px}
.info-val.muted{color:var(--text3)}

/* 편집 모드 인풋 */
.e-input{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:6px 9px;font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s;width:100%}
.e-input:focus{border-color:rgba(201,168,76,.45)}
.e-select{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:6px 9px;font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text);cursor:pointer;outline:none;transition:border-color .2s;width:100%}
.e-select:focus{border-color:rgba(201,168,76,.45)}
.e-textarea{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:8px 10px;font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text);outline:none;resize:vertical;min-height:80px;transition:border-color .2s;width:100%;line-height:1.7}
.e-textarea:focus{border-color:rgba(201,168,76,.45)}
.e-textarea::placeholder{color:var(--text3)}

/* 비고 박스 */
.note-box{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:14px;font-size:13px;color:var(--text2);line-height:1.8;min-height:80px}
.note-box.empty{color:var(--text3)}

/* ── 활동 노트 ── */
.act-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.act-label{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.act-label .dot{width:5px;height:5px;border-radius:50%;background:var(--blue);flex-shrink:0}
.act-label .cnt{font-size:11px;font-weight:600;padding:1px 7px;border-radius:10px;background:rgba(91,156,246,.15);color:var(--blue)}
.btn-add-note{font-family:'Pretendard',sans-serif;font-size:12px;font-weight:600;padding:7px 14px;border-radius:6px;background:var(--blue);border:none;color:#fff;cursor:pointer;transition:all .2s}
.btn-add-note:hover{background:#4a8be0;transform:translateY(-1px)}

.notes-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.note-card{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:12px 14px}
.note-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.note-card-date{font-size:11px;font-weight:600;color:var(--text3)}
.nc-del{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:3px;transition:color .15s;font-family:'Pretendard',sans-serif}
.nc-del:hover{color:var(--red);background:rgba(240,96,96,.1)}
.note-card-text{font-size:13px;color:var(--text2);line-height:1.8;white-space:pre-wrap}

.note-empty{text-align:center;padding:22px 0;color:var(--text3);font-size:13px}

.note-input-wrap{border-top:1px solid var(--border);padding-top:14px;display:none}
.note-input-wrap.show{display:block}
.note-input-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em;margin-bottom:7px;display:block}
.note-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text);outline:none;resize:none;height:88px;transition:border-color .2s;line-height:1.7}
.note-textarea:focus{border-color:rgba(201,168,76,.45)}
.note-textarea::placeholder{color:var(--text3)}
.note-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
.btn-nc{font-family:'Pretendard',sans-serif;font-size:12px;padding:7px 14px;border-radius:6px;cursor:pointer;transition:all .2s}
.btn-nc.cancel{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-nc.cancel:hover{border-color:var(--text2)}
.btn-nc.save{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:#160d00;border:none;font-weight:700}
.btn-nc.save:hover{box-shadow:0 3px 12px rgba(201,168,76,.3)}

/* 저장 버튼 */
.detail-save-bar{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0;background:var(--bg2)}
.btn-discard{font-family:'Pretendard',sans-serif;font-size:13px;padding:9px 20px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .2s}
.btn-discard:hover{border-color:var(--text2)}
.btn-save-all{font-family:'Pretendard',sans-serif;font-size:13px;font-weight:700;padding:9px 24px;border-radius:6px;background:linear-gradient(135deg,var(--gold-light),var(--gold));color:#160d00;border:none;cursor:pointer;transition:all .2s;letter-spacing:.04em}
.btn-save-all:hover{box-shadow:0 4px 16px rgba(201,168,76,.3)}

/* 활동노트 모달 (카드에서 열림) */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:400;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-bg.on{opacity:1;pointer-events:all}
.note-modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:500px;max-width:94vw;max-height:80vh;overflow-y:auto;padding:24px;scrollbar-width:thin}
.note-modal::before{content:'';display:block;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin-bottom:18px;opacity:.45}
.nm-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.nm-who{display:flex;align-items:center;gap:10px}
.nm-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.nm-name{font-size:15px;font-weight:700}
.nm-sub{font-size:11px;color:var(--text3);margin-top:1px}
.nm-close{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nm-close:hover{background:rgba(255,255,255,.12);color:var(--text)}

@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .2s ease}
.sb-coming{margin-left:auto;font-size:9px;color:var(--text3);background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px}



body.light-mode .sb-top,body.light-mode .sb-user,body.light-mode .sidebar{background:#1a2a42;border-color:#243858}
body.light-mode .sb-item{color:#a0bcd8}
body.light-mode .sb-item:hover{background:rgba(255,255,255,.08);color:#fff}
body.light-mode .sb-item.active{background:rgba(201,168,76,.15);color:var(--gold-light)}
body.light-mode .sb-section{color:#5a7a9a}

/* ── 라이트 모드 전체 ── */
[data-theme="light"]{
  --bg:#eef2f7;--bg2:#ffffff;--bg3:#e4eaf2;--bg4:#d8e2ee;--bg5:#f0f4f9;
  --border:#c0d0e0;--border2:#a0b8cc;
  --text:#0d1f36;--text2:#2a4060;--text3:#6080a0;
  --gold-dim:rgba(180,140,40,.12);
}
[data-theme="light"] .sidebar{background:var(--bg2) !important}
[data-theme="light"] .sb-top,[data-theme="light"] .sb-user{background:var(--bg2) !important;border-color:var(--border) !important}
[data-theme="light"] .sb-item{color:var(--text2) !important}
[data-theme="light"] .sb-item:hover{background:rgba(0,0,0,.04) !important;color:var(--text) !important}

// ── 공통 세션 초기화 (사이드바 이름/직급/아바타 + 접근 권한 메뉴) ──
window.addEventListener('DOMContentLoaded', function(){
  var RANKS = {
    'adperson1':'본부장','adperson2':'팀장','adperson3':'파트장',
    'adperson4':'메인','adperson5':'어쏘','adperson6':'어쏘',
    'adperson7':'CX','adperson8':'어시','adperson9':'어시'
  };
  var ROLE_LABEL = {admin:'—', exec:'실행파트', ops:'운영파트'};
  var ALLOWED_ADMIN = ['adperson1','adperson2','adperson3','adperson8'];

  var u = sessionStorage.getItem('crm_user');
  if(!u){ window.location.href='index.html'; return; }
  var user = JSON.parse(u);
  var rank = RANKS[user.id] || '';
  var roleLabel = ROLE_LABEL[user.role] || '';

  // 이름/직급 (다양한 id 대응)
  ['sbUserName','sbName'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.textContent = user.name + (rank ? ' ' + rank : '');
  });
  // 권한
  ['sbUserRole','sbRole'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.textContent = roleLabel;
  });
  // 아바타
  ['sbUserAv','sbAvatar'].forEach(function(id){
    var el = document.getElementById(id);
    if(!el) return;
    var photo = sessionStorage.getItem('profile_photo_'+user.id);
    if(photo){ el.innerHTML = '<img src="'+photo+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">'; }
    else if(!el.querySelector('img')){ el.textContent = user.name[0]; }
  });
  // 접근 권한 메뉴: 허용 계정만 표시
  var menuEl = document.getElementById('menuAccessMgmt');
  if(menuEl && ALLOWED_ADMIN.indexOf(user.id) === -1) menuEl.style.display = 'none';
});


function toggleLightMode(){
  var u = sessionStorage.getItem('crm_user');
  var uid = u ? JSON.parse(u).id : 'guest';
  var isLight = document.documentElement.getAttribute('data-theme') === 'light';
  if(isLight){
    document.documentElement.removeAttribute('data-theme');
    localStorage.removeItem('crm_light_'+uid);
  } else {
    document.documentElement.setAttribute('data-theme','light');
    localStorage.setItem('crm_light_'+uid,'1');
  }
  var btn = document.getElementById('lightModeBtn');
  if(btn) btn.innerHTML = isLight ? '<span class="icon">🌙</span>라이트 모드' : '<span class="icon">☀️</span>다크 모드';
}
// 버튼 라벨 초기화
(function(){
  var btn = document.getElementById('lightModeBtn');
  if(btn && document.documentElement.getAttribute('data-theme')==='light')
    btn.innerHTML = '<span class="icon">☀️</span>다크 모드';
})();

// 라이트모드 즉시 적용 (깜빡임 방지)
(function(){
  var u = sessionStorage.getItem('crm_user');
  if(u){ var uid = JSON.parse(u).id; if(localStorage.getItem('crm_light_'+uid)==='1') document.documentElement.setAttribute('data-theme','light'); }
})();



</script>

const typeBadge=v=>{const m={기존:'b-type-old',신규:'b-type-new',소개:'b-type-ref'};return v?`<span class="badge ${m[v]||''}">${v}</span>`:''};
const tmBadge=v=>v==='상'?`<span class="badge b-tm-high">▲ 상</span>`:v?`<span style="font-size:12px;color:var(--text2)">${v}</span>`:'—';
const dash=v=>v||'<span style="color:var(--text3)">—</span>';

// ── 필터 ──────────────────────────────────
function getFiltered(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  return DATA.filter(d=>{
    if(q&&!d.name.includes(q)&&!d.rank.includes(q)&&!d.phone.includes(q))return false;
    if(activeExec&&d.exec!==activeExec)return false;
    return true;
  });
}
function toggleExec(btn){
  const v=btn.dataset.exec;
  activeExec=activeExec===v?null:v;
  document.querySelectorAll('.exec-btn').forEach(b=>b.classList.toggle('active',b.dataset.exec===activeExec));
  renderBoard();
}
function resetFilter(){
  activeExec=null;
  document.querySelectorAll('.exec-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('searchInput').value='';
  renderBoard();
}

// ── 카드 HTML ─────────────────────────────
function cardHTML(d){
  const notes=NOTES[d.id]||[];
  const prev=notes.length>0
    ?`<div class="note-preview">${notes.slice(0,2).map(n=>`<div class="note-prev-item"><span class="note-prev-date">${n.date}</span><span class="note-prev-text">${n.text.split('\n')[0]}</span></div>`).join('')}${notes.length>2?`<div class="note-prev-more">+${notes.length-2}개 더</div>`:''}</div>`:'';
  return `<div class="card">
    <div class="card-head">
      <div class="card-info" style="margin-left:0">
        <div class="card-name">${d.name}<span class="card-rank">${d.rank?' · '+d.rank:''}</span></div>
        <div class="card-sub">${d.exec||''}</div>
      </div>
      <button class="card-detail-btn" onclick="openDetail(${d.id})">상세</button>
    </div>
    ${d.stage?`<div class="card-stage">${stageBadge(d.stage)}</div>`:''}
    <div class="card-meta">
      ${d.phone?`<div class="card-meta-row"><span class="micon">📞</span>${d.phone}</div>`:''}
      ${(d.date||d.region)?`<div class="card-meta-row"><span class="micon">📍</span>${d.date?`<span class="card-date">${d.date}일</span>`:''}${d.date&&d.region?' · ':''}${d.region||''}</div>`:''}
      ${d.tm?`<div class="card-meta-row"><span class="micon">📡</span>TM감도 ${tmBadge(d.tm)}</div>`:''}
    </div>
    ${prev}
    <button class="card-note-btn" onclick="openNoteModal(${d.id})">📝 활동노트 ${notes.length?`(${notes.length}건)`:'입력하기'} →</button>
  </div>`;
}

// ── 보드 렌더 ─────────────────────────────
function renderBoard(){
  const f=getFiltered();
  document.getElementById('totalDesc').textContent=`전체 ${DATA.length}명 중 ${f.length}명 표시`;
  document.getElementById('totalInfo').innerHTML=`전체 <strong>${f.length}</strong>명 표시`;
  const cols={
    meeting:f.filter(d=>!d.result),
    done:f.filter(d=>d.result==='계약완료'),
    book:f.filter(d=>d.result==='예약완료'),
    doc:f.filter(d=>d.result==='서류수취'),
    manage:f.filter(d=>d.result==='관리필요'),
  };
  Object.entries(cols).forEach(([k,list])=>{
    document.getElementById('cnt-'+k).textContent=list.length;
    document.getElementById('body-'+k).innerHTML=list.length
      ?list.map(d=>cardHTML(d)).join('')
      :`<div class="empty-col"><div style="font-size:22px">📭</div>없음</div>`;
  });
}

// ── 상세 오버레이 ─────────────────────────
function openDetail(id){
  detailId=id; editMode=false;
  const d=DATA.find(x=>x.id===id);
  // 헤더
  const av=document.getElementById('d-avatar');
  av.style.background=ac(d.name); av.textContent=al(d.name);
  document.getElementById('d-name').textContent=d.name;
  document.getElementById('d-rank').textContent=d.rank||'';
  document.getElementById('d-type-badge').innerHTML=typeBadge(d.type);
  document.getElementById('editToggleBtn').textContent='✏️ 수정';
  document.getElementById('detailSaveBar').style.display='none';
  renderDetailGrid(d, false);
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail(){
  document.getElementById('detailOverlay').classList.remove('open');
  detailId=null; editMode=false;
}
function toggleEditMode(){
  editMode=!editMode;
  const d=DATA.find(x=>x.id===detailId);
  renderDetailGrid(d, editMode);
  document.getElementById('editToggleBtn').textContent=editMode?'취소':'✏️ 수정';
  document.getElementById('detailSaveBar').style.display=editMode?'flex':'none';
}
function discardEdit(){
  editMode=false;
  const d=DATA.find(x=>x.id===detailId);
  renderDetailGrid(d, false);
  document.getElementById('editToggleBtn').textContent='✏️ 수정';
  document.getElementById('detailSaveBar').style.display='none';
}

function renderDetailGrid(d, edit){
  const notes=NOTES[d.id]||[];
  const irow=(label,val,field,type='text',opts=[])=>{
    let valHTML;
    if(edit){
      if(type==='select'){
        valHTML=`<select class="e-select" id="ef_${field}"><option value="">선택</option>${opts.map(o=>`<option${d[field]===o?' selected':''}>${o}</option>`).join('')}</select>`;
      } else if(type==='textarea'){
        valHTML=`<textarea class="e-textarea" id="ef_${field}">${d[field]||''}</textarea>`;
      } else {
        valHTML=`<input class="e-input" id="ef_${field}" type="text" value="${d[field]||''}">`;
      }
    } else {
      valHTML=`<span class="${val?'':'muted'}">${val||'—'}</span>`;
    }
    return `<div class="info-row"><span class="info-label">${label}</span><div class="info-val">${valHTML}</div></div>`;
  };

  document.getElementById('detailGrid').innerHTML=`
    <!-- 기본 정보 -->
    <div class="detail-card">
      <div class="dc-title"><span class="dot" style="background:var(--blue)"></span>기본 정보</div>
      ${irow('연락처',d.phone,'phone')}
      ${irow('고객유형',d.type,'type','select',['신규','기존','소개'])}
      ${irow('담당자',d.exec,'exec','select',['조계현','이세호','기여운','최연전'])}
      ${irow('담당 컨설턴트',d.consult,'consult','select',['박경화','박혜은','박민경','조승현','강아름','백선중','전정훈','박나라'])}
    </div>

    <!-- 미팅 정보 -->
    <div class="detail-card">
      <div class="dc-title"><span class="dot" style="background:var(--gold)"></span>미팅 정보</div>
      ${irow('미팅 일정',d.date,'date')}
      ${irow('미팅 지역',d.region,'region')}
      ${irow('미팅 결과',d.result,'result','select',['계약완료','예약완료','서류수취','관리필요','계약거부','미팅불발'])}
    </div>

    <!-- 영업 정보 -->
    <div class="detail-card">
      <div class="dc-title"><span class="dot" style="background:var(--green)"></span>영업 정보${edit?'<span class="edit-hint">수정 가능</span>':''}</div>
      ${irow('TM 감도',d.tm,'tm','select',['상','중','하'])}
      ${irow('관리 구간',d.stage,'stage','select',['리드','프로스펙팅','딜클로징','리텐션'])}
    </div>

    <!-- 비고 -->
    <div class="detail-card">
      <div class="dc-title"><span class="dot" style="background:var(--purple)"></span>비고</div>
      ${edit
        ?`<textarea class="e-textarea" id="ef_memo" style="min-height:110px">${d.memo||''}</textarea>`
        :`<div class="note-box${d.memo?'':' empty'}" style="white-space:pre-wrap">${d.memo||'비고 없음'}</div>`
      }
    </div>

    <!-- 활동 노트 -->
    <div class="detail-card full">
      <div class="act-head">
        <div class="act-label"><span class="dot"></span>활동 노트 <span class="cnt" id="detail-note-cnt">${notes.length}</span>건</div>
        <button class="btn-add-note" onclick="showNoteInput('detail')">＋ 노트 추가</button>
      </div>
      <div class="notes-list" id="detail-notes-list">
        ${notes.length
          ?notes.map(n=>`<div class="note-card"><div class="note-card-head"><span class="note-card-date">${n.date}</span><button class="nc-del" onclick="deleteNote(${d.id},'${n.id}','detail')">삭제</button></div><div class="note-card-text">${n.text}</div></div>`).join('')
          :'<div class="note-empty">활동 노트가 없습니다</div>'
        }
      </div>
      <div class="note-input-wrap" id="detail-note-input">
        <label class="note-input-label">새 활동 노트</label>
        <textarea class="note-textarea" id="detail-note-textarea" placeholder="고객과의 통화 내용, 관심도, 특이사항 등"></textarea>
        <div class="note-footer">
          <button class="btn-nc cancel" onclick="hideNoteInput('detail')">취소</button>
          <button class="btn-nc save" onclick="saveNote('detail')">저장</button>
        </div>
      </div>
    </div>
  `;
}

function saveDetail(){
  const d=DATA.find(x=>x.id===detailId);
  ['phone','type','exec','consult','date','region','result','tm','stage','memo'].forEach(k=>{
    const el=document.getElementById('ef_'+k);
    if(el) d[k]=el.value;
  });
  editMode=false;
  document.getElementById('editToggleBtn').textContent='✏️ 수정';
  document.getElementById('detailSaveBar').style.display='none';
  // 헤더 뱃지 업데이트
  document.getElementById('d-type-badge').innerHTML=typeBadge(d.type);
  renderDetailGrid(d, false);
  renderBoard();
}

// ── 활동 노트 공통 ────────────────────────
function showNoteInput(ctx){
  document.getElementById(ctx==='detail'?'detail-note-input':'nm-input').classList.add('show');
  document.getElementById(ctx==='detail'?'detail-note-textarea':'nm-textarea').focus();
}
function hideNoteInput(ctx){
  const inp=document.getElementById(ctx==='detail'?'detail-note-input':'nm-input');
  const ta=document.getElementById(ctx==='detail'?'detail-note-textarea':'nm-textarea');
  inp.classList.remove('show'); ta.value='';
}
function saveNote(ctx){
  const id=ctx==='detail'?detailId:noteTarget;
  const text=document.getElementById(ctx==='detail'?'detail-note-textarea':'nm-textarea').value.trim();
  if(!text)return;
  const today=new Date();
  const nid='n'+Date.now();
  NOTES[id].unshift({id:nid,date:`${today.getMonth()+1}. ${today.getDate()}.`,text});
  hideNoteInput(ctx);
  if(ctx==='detail') renderDetailGrid(DATA.find(x=>x.id===id), editMode);
  else renderNoteModal();
  renderBoard();
}
function deleteNote(id, nid, ctx){
  if(!confirm('삭제하시겠습니까?'))return;
  NOTES[id]=NOTES[id].filter(n=>n.id!==nid);
  if(ctx==='detail') renderDetailGrid(DATA.find(x=>x.id===id), editMode);
  else renderNoteModal();
  renderBoard();
}

// ── 카드 활동노트 모달 ────────────────────
function openNoteModal(id){
  noteTarget=id;
  const d=DATA.find(x=>x.id===id);
  document.getElementById('nm-avatar').style.background=ac(d.name);
  document.getElementById('nm-avatar').textContent=al(d.name);
  document.getElementById('nm-name').textContent=d.name+' — 활동 노트';
  document.getElementById('nm-sub').textContent=(d.rank||'')+(d.exec?' · '+d.exec:'');
  hideNoteInput('modal');
  renderNoteModal();
  document.getElementById('noteModal').classList.add('on');
}
function closeNoteModal(){document.getElementById('noteModal').classList.remove('on');noteTarget=null}
function renderNoteModal(){
  const notes=NOTES[noteTarget]||[];
  document.getElementById('nm-cnt').textContent=notes.length;
  document.getElementById('nm-list').innerHTML=notes.length
    ?notes.map(n=>`<div class="note-card"><div class="note-card-head"><span class="note-card-date">${n.date}</span><button class="nc-del" onclick="deleteNote(${noteTarget},'${n.id}','modal')">삭제</button></div><div class="note-card-text">${n.text}</div></div>`).join('')
    :'<div class="note-empty">활동 노트가 없습니다</div>';
}

renderBoard();



</script>
</body>
</html>
