<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>분양회 회원 관리 — 분양의신 CRM</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
:root{
  --bg:#080f1a;--bg2:#0d1623;--bg3:#111e30;--bg4:#162236;--border:#1e3050;
  --gold:#C9A84C;--gold-light:#F0D080;--gold-dim:rgba(201,168,76,.15);
  --text:#e8edf5;--text2:#8fa3bc;--text3:#4d6480;
  --green:#2dd4a0;--red:#f06060;--blue:#5b9cf6;--purple:#a78bfa;--orange:#fb923c;
  --sidebar:220px;--radius:10px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:13px}

/* ── 사이드바 ── */
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto;scrollbar-width:none}
.sidebar::-webkit-scrollbar{display:none}
.sb-top{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo{height:28px;width:auto;filter:drop-shadow(0 0 6px rgba(201,168,76,.4))}
.sb-brand{font-size:11px;font-weight:600;color:var(--gold-light);letter-spacing:.04em;line-height:1.3}
.sb-brand span{display:block;font-size:9px;font-weight:300;color:var(--text3)}
.sb-user{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1e4d8c,#0d2d5a);border:1.5px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--gold-light);flex-shrink:0;overflow:hidden}
.sb-avatar img{width:100%;height:100%;object-fit:cover}
.sb-uname{font-size:13px;font-weight:600;color:var(--text)}
.sb-role{font-size:11px;color:var(--gold);font-weight:500}
.sb-nav{flex:1;padding:8px 0}
.sb-section{padding:10px 16px 4px;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.12em;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 16px;color:var(--text2);font-size:13px;font-weight:400;cursor:pointer;transition:all .15s;border-left:2px solid transparent;text-decoration:none}
.sb-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.sb-item.active{background:var(--gold-dim);color:var(--gold-light);border-left-color:var(--gold);font-weight:600}
.sb-item .icon{font-size:14px;width:17px;text-align:center;flex-shrink:0}
.sb-coming{margin-left:auto;font-size:9px;color:var(--text3);background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px}
.sb-bottom{padding:10px 0;border-top:1px solid var(--border)}

/* ── 메인 ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.page-title{font-size:15px;font-weight:700;color:var(--text)}
.date-badge{font-size:11px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:5px 12px;border-radius:6px}
.content{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── 스탯 카드 ── */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden;transition:border-color .2s}
.stat-card:hover{border-color:rgba(201,168,76,.3)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:.3}
.stat-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.05em;margin-bottom:6px;text-transform:uppercase}
.stat-val{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-.02em;line-height:1}
.stat-val.c-green{color:var(--green)}.stat-val.c-yellow{color:var(--gold-light)}.stat-val.c-red{color:var(--red)}.stat-val.c-gold{color:var(--gold);font-size:18px}
.stat-sub{font-size:10px;color:var(--text3);margin-top:5px}
.stat-warn{font-size:10px;color:var(--orange);margin-top:5px}

/* ── 필터바 ── */
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filter-bar input[type=text]{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:12px;width:190px;outline:none;transition:border .15s}
.filter-bar input[type=text]:focus{border-color:rgba(201,168,76,.4)}
.filter-bar input[type=text]::placeholder{color:var(--text3)}
.filter-bar select{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:12px;outline:none;cursor:pointer}
.btn-gold{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;border:1px solid rgba(201,168,76,.4);background:var(--gold-dim);color:var(--gold-light);font-family:'Pretendard',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-gold:hover{background:rgba(201,168,76,.22);border-color:var(--gold)}
.filter-count{margin-left:auto;font-size:11px;color:var(--text3)}

/* ── 테이블 ── */
.table-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--bg4)}
.tbl th{padding:10px 14px;font-size:10px;font-weight:700;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text2);white-space:nowrap}
.tbl tbody tr:last-child td{border-bottom:none}
.mrow{cursor:pointer;transition:background .12s}
.mrow:hover td{background:rgba(201,168,76,.04)}
.td-id{font-weight:700;color:var(--gold)!important;font-size:12px}
.td-name{font-weight:600;color:var(--text)!important;font-size:14px}
.td-round{font-weight:700;color:var(--text)!important;text-align:center}

/* 상태 배지 */
.badge{display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;white-space:nowrap;min-width:60px}
.b-active{background:rgba(45,212,160,.12);color:var(--green);border:1px solid rgba(45,212,160,.2)}
.b-paused{background:rgba(251,146,60,.1);color:var(--orange);border:1px solid rgba(251,146,60,.2)}
.b-churned{background:rgba(240,96,96,.1);color:var(--red);border:1px solid rgba(240,96,96,.2)}

/* D-day */
.dd{display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;min-width:48px}
.dd-ok{background:rgba(45,212,160,.12);color:var(--green)}
.dd-warn{background:rgba(240,208,128,.12);color:var(--gold-light)}
.dd-over{background:rgba(240,96,96,.1);color:var(--red)}

/* 납부 버튼 */
.btn-pay{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:5px;border:1px solid rgba(201,168,76,.35);background:var(--gold-dim);color:var(--gold-light);font-family:'Pretendard',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-pay:hover{background:rgba(201,168,76,.22)}

/* ── 팝업 오버레이 ── */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.popup-overlay.open{opacity:1;pointer-events:all}
.popup{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:820px;max-width:calc(100vw - 48px);max-height:calc(100vh - 80px);display:flex;flex-direction:column;transform:translateY(12px) scale(.98);transition:transform .2s;overflow:hidden}
.popup-overlay.open .popup{transform:translateY(0) scale(1)}

/* 팝업 헤더 */
.popup-head{padding:18px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-shrink:0}
.popup-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1e4d8c,#0d2d5a);border:2px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--gold-light);flex-shrink:0}
.popup-name{font-size:18px;font-weight:700;color:var(--text)}
.popup-meta{font-size:12px;color:var(--text3);margin-top:2px}
.popup-status{margin-left:auto;display:flex;align-items:center;gap:8px}
.popup-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;font-family:'Pretendard',sans-serif}
.popup-close:hover{background:var(--bg4);color:var(--text)}

/* 팝업 바디 */
.popup-body{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:20px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.popup-body::-webkit-scrollbar{width:4px}
.popup-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* 팝업 섹션 */
.psec-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.psec-title::before{content:'';width:3px;height:11px;border-radius:2px;background:var(--gold);display:inline-block}

/* 정보 그리드 */
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.info-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.info-label{font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:500}
.info-val{font-size:13px;font-weight:600;color:var(--text)}
.info-val.gold{color:var(--gold-light)}

/* 납부 이력 테이블 */
.htbl{width:100%;border-collapse:collapse;font-size:12px}
.htbl th{padding:7px 10px;font-size:10px;font-weight:600;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);letter-spacing:.04em;background:var(--bg4)}
.htbl td{padding:8px 10px;border-bottom:1px solid rgba(30,48,80,.6);color:var(--text2)}
.htbl tr:last-child td{border-bottom:none}
.htbl tbody tr:hover td{background:rgba(255,255,255,.02)}

/* 업무 할 일 */
.tasks{display:flex;flex-direction:column;gap:4px}
.task-row{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:7px;font-size:12px}
.task-done{background:rgba(45,212,160,.06);color:rgba(45,212,160,.55)}
.task-soon{background:rgba(240,208,128,.08);color:var(--gold-light)}
.task-future{background:rgba(255,255,255,.03);color:var(--text3)}
.task-badge{font-size:10px;font-weight:700;min-width:36px;text-align:center;padding:1px 0}
.task-text{flex:1}
.task-who{font-size:10px;background:rgba(255,255,255,.06);padding:1px 6px;border-radius:3px;opacity:.7}
.task-date{font-size:10px;opacity:.5}

/* 팝업 내 납부 폼 */
.pay-form-wrap{background:var(--bg4);border:1px solid rgba(201,168,76,.22);border-radius:8px;padding:14px 16px}
.pay-form-title{font-size:12px;font-weight:700;color:var(--gold-light);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.pay-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.form-field label{font-size:10px;font-weight:600;color:var(--text3);display:block;margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase}
.form-field input[type=date]{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:12px;outline:none;transition:border .15s}
.form-field input[type=date]:focus{border-color:rgba(201,168,76,.4)}
.pay-form-footer{display:flex;justify-content:space-between;align-items:center}

/* 팝업 푸터 */
.popup-foot{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;background:var(--bg2)}
.btn-sm{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Pretendard',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-sm:hover{background:var(--bg4);color:var(--text)}
.btn-danger{border-color:rgba(240,96,96,.3);color:var(--red)}
.btn-danger:hover{background:rgba(240,96,96,.07)}
.btn-confirm{border-color:rgba(201,168,76,.4);background:var(--gold-dim);color:var(--gold-light)}
.btn-confirm:hover{background:rgba(201,168,76,.22)}
.btn-reactivate{border-color:rgba(45,212,160,.3);color:var(--green)}
.btn-reactivate:hover{background:rgba(45,212,160,.07)}

/* 토스트 */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid rgba(201,168,76,.35);border-radius:8px;padding:11px 18px;font-size:13px;color:var(--gold-light);z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;font-weight:500}
.toast.show{opacity:1;transform:translateY(0)}

/* 구분선 */
.divider{height:1px;background:var(--border);margin:4px 0}

/* 라이트모드 */
body.light-mode .sb-top,body.light-mode .sb-user,body.light-mode .sidebar{background:#1a2a42;border-color:#243858}
body.light-mode .sb-item{color:#a0bcd8}
body.light-mode .sb-item:hover{background:rgba(255,255,255,.08);color:#fff}
body.light-mode .sb-item.active{background:rgba(201,168,76,.15);color:var(--gold-light)}
body.light-mode .sb-section{color:#5a7a9a}
[data-theme="light"]{--bg:#eef2f7;--bg2:#ffffff;--bg3:#e4eaf2;--bg4:#d8e2ee;--border:#c0d0e0;--text:#0d1f36;--text2:#2a4060;--text3:#6080a0;--gold-dim:rgba(180,140,40,.12)}
[data-theme="light"] .sidebar{background:var(--bg2)!important}
[data-theme="light"] .sb-top,[data-theme="light"] .sb-user{background:var(--bg2)!important;border-color:var(--border)!important}
[data-theme="light"] .sb-item{color:var(--text2)!important}
[data-theme="light"] .sb-item:hover{background:rgba(0,0,0,.04)!important;color:var(--text)!important}
[data-theme="light"] .sb-item.active{background:rgba(201,168,76,.12)!important;color:#8a6010!important;border-left-color:var(--gold)!important}
[data-theme="light"] .sb-section{color:var(--text3)!important}
[data-theme="light"] .sb-brand{color:#7a5a08!important}
[data-theme="light"]{--gold:#9a6800;--gold-light:#7a5200}
[data-theme="light"] .sb-role{color:#9a6800!important}
[data-theme="light"] .topbar,[data-theme="light"] .popup{background:var(--bg2)!important}
[data-theme="light"] .sb-coming{color:var(--text3)!important;background:rgba(0,0,0,.08)!important}
[data-theme="light"] thead tr,[data-theme="light"] .htbl th{background:var(--bg4)!important}
[data-theme="light"] .tbl td{color:var(--text2)!important}
[data-theme="light"] .td-name{color:var(--text)!important}
[data-theme="light"] .popup-overlay{background:rgba(0,0,0,.5)}
</style>
<script>
(function(){var u=sessionStorage.getItem('crm_user');if(u){var uid=JSON.parse(u).id;if(localStorage.getItem('crm_light_'+uid)==='1')document.documentElement.setAttribute('data-theme','light');}})();
</script>
</head>
<body>

<aside class="sidebar">
  <div class="sb-top">
    <img src="./logo-gold.png" class="sb-logo" alt="분양의신" onerror="this.style.display='none'">
    <div class="sb-brand">분양의신 CRM<span>광고인㈜ 대외협력팀</span></div>
  </div>
  <div class="sb-user">
    <div class="sb-avatar" id="sbAvatar">?</div>
    <div><div class="sb-uname" id="sbName">—</div><div class="sb-role" id="sbRole">—</div></div>
  </div>
  <nav class="sb-nav">
    <div class="sb-section">총괄</div>
    <a class="sb-item" href="dashboard.html"><span class="icon">📊</span>대시보드</a>
    <a class="sb-item" href="#" onclick="return false" style="opacity:.5;cursor:default"><span class="icon">📅</span>월간 실적<span class="sb-coming">준비중</span></a>
    <a class="sb-item" href="#" onclick="return false" style="opacity:.5;cursor:default"><span class="icon">📆</span>주간 실적<span class="sb-coming">준비중</span></a>
    <div class="sb-section">실행</div>
    <a class="sb-item" href="customers.html"><span class="icon">👥</span>고객 DB</a>
    <a class="sb-item" href="pipeline.html"><span class="icon">🔀</span>파이프라인</a>
    <a class="sb-item" href="#" onclick="return false" style="opacity:.5;cursor:default"><span class="icon">⭐</span>분양회 입회자<span class="sb-coming">준비중</span></a>
    <a class="sb-item" href="article.html"><span class="icon">📰</span>취재 · 아티클</a>
    <a class="sb-item" href="premium-agency.html"><span class="icon">🏢</span>프리미엄 대행사</a>
    <a class="sb-item" href="wanpan.html"><span class="icon">🚚</span>완판트럭</a>
    <div class="sb-section">운영</div>
    <a class="sb-item" href="#" onclick="return false" style="opacity:.5;cursor:default"><span class="icon">📋</span>매출일보<span class="sb-coming">준비중</span></a>
    <a class="sb-item" href="revenue.html"><span class="icon">💰</span>통합 매출 관리</a>
    <a class="sb-item" href="reward.html"><span class="icon">🎁</span>리워드 관리</a>
    <a class="sb-item active" href="members.html"><span class="icon">👑</span>분양회 회원 관리</a>
  </nav>
  <div class="sb-bottom">
    <a class="sb-item" id="lightModeBtn" onclick="toggleLightMode()" style="cursor:pointer"><span class="icon">🌙</span>라이트 모드</a>
    <a class="sb-item" id="menuAccessMgmt" href="admin-accounts.html"><span class="icon">⚙️</span>접근 권한</a>
    <a class="sb-item" href="mypage.html"><span class="icon">👤</span>마이페이지</a>
    <a class="sb-item" href="index.html"><span class="icon">🚪</span>로그아웃</a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <span style="font-size:18px">👑</span>
      <span class="page-title">분양회 회원 관리</span>
      <span style="font-size:11px;color:var(--text3)">회원 납부 현황 · 혜택 기간 · 업무 일정 통합 관리</span>
    </div>
    <div><div class="date-badge" id="todayBadge">기준일 —</div></div>
  </div>
  <div class="content">

    <div class="stats-row" id="statsRow"></div>

    <div class="filter-bar">
      <input type="text" id="q" placeholder="🔍  이름 · 연락처 검색" oninput="render()">
      <select id="fs" onchange="render()">
        <option value="">전체 상태</option>
        <option value="active">활성</option>
        <option value="paused">일시중단</option>
        <option value="churned">이탈</option>
      </select>
      <select id="fe" onchange="render()"><option value="">전체 실행파트</option></select>
      <button class="btn-gold" onclick="openNewMemberForm()">＋ 신규 회원 등록</button>
      <div class="filter-count" id="fcount"></div>
    </div>

    <div class="table-wrap">
      <table class="tbl">
        <thead><tr>
          <th style="width:56px">회차</th>

function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(members)); }

// ── 계산 헬퍼 ──
function getStatus(m){
  if(m.churned) return 'churned';
  if(!m.rounds.length) return 'new';
  return new Date(m.rounds[m.rounds.length-1].e) >= TODAY ? 'active' : 'paused';
}
function getDday(m){
  if(!m.rounds.length || m.churned) return null;
  return Math.round((new Date(m.rounds[m.rounds.length-1].e) - TODAY) / 86400000);
}
function fmt(d){ if(!d) return '—'; const dt=new Date(d); return `${dt.getMonth()+1}/${dt.getDate()}`; }
function fmtFull(d){ if(!d) return '—'; const dt=new Date(d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }
function nextId(){
  const nums = members.map(m=>parseInt(m.id.replace('B-',''))).filter(n=>!isNaN(n));
  return 'B-' + (Math.max(0,...nums)+1);
}
function getNextStart(m){
  if(!m.rounds.length) return fmtFull(TODAY.toISOString());
  const d=new Date(m.rounds[m.rounds.length-1].e); d.setDate(d.getDate()+1);
  return fmtFull(d.toISOString());
}
function getNextEnd(startStr){
  const d=new Date(startStr); d.setDate(d.getDate()+30);
  return fmtFull(d.toISOString());
}

// ── 업무 할 일 ──
function getTasks(m){
  if(!m.rounds.length) return [];
  const s = new Date(m.rounds[m.rounds.length-1].s);
  return [
    {dOff:1, label:'혜택 안내 문자 발송', who:'운영파트'},
    {dOff:7, label:'첫 혜택 사용 확인 콜', who:'운영파트'},
    {dOff:20,label:'만족도 체크 · 갱신 권유 시작', who:'실행파트'},
    {dOff:25,label:'갱신 안내 문자 발송', who:'운영파트'},
    {dOff:28,label:'갱신 최종 확인 콜', who:'실행파트'},
    {dOff:30,label:'갱신 or 이탈 처리', who:'실행파트'},
  ].map(t=>{
    const due=new Date(s); due.setDate(due.getDate()+t.dOff);
    const diff=Math.round((due-TODAY)/86400000);
    return {...t, due, diff,
      cls: diff<0?'task-done':diff<=3?'task-soon':'task-future',
      prefix: diff<0?'완료':diff===0?'오늘':`D-${diff}`
    };
  });
}

// ── 스탯 렌더 ──
function renderStats(){
  const total=members.length;
  const active=members.filter(m=>getStatus(m)==='active').length;
  const paused=members.filter(m=>getStatus(m)==='paused').length;
  const churned=members.filter(m=>m.churned).length;
  const rev=active*550000;
  const warn=members.filter(m=>{const d=getDday(m);return d!==null&&d>=0&&d<=7;}).length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="stat-label">전체 회원</div><div class="stat-val">${total}<span style="font-size:14px;color:var(--text3)">명</span></div><div class="stat-sub">누적 가입</div></div>
    <div class="stat-card"><div class="stat-label">활성</div><div class="stat-val c-green">${active}<span style="font-size:14px">명</span></div><div class="stat-sub">혜택 유효</div></div>
    <div class="stat-card"><div class="stat-label">일시중단</div><div class="stat-val c-yellow">${paused}<span style="font-size:14px">명</span></div><div class="stat-sub">재가입 대상</div></div>
    <div class="stat-card"><div class="stat-label">이탈</div><div class="stat-val c-red">${churned}<span style="font-size:14px">명</span></div><div class="stat-sub">이탈 처리됨</div></div>
    <div class="stat-card"><div class="stat-label">월 예상 수입</div><div class="stat-val c-gold">₩${rev.toLocaleString()}</div><div class="stat-warn">⚠ D-7 이내 ${warn}명</div></div>`;
}

// ── 필터 초기화 ──
function initFilters(){
  const execs=[...new Set(members.map(m=>m.salesExec))].sort();
  const fe=document.getElementById('fe');
  execs.forEach(e=>{const o=document.createElement('option');o.value=e;o.textContent=e;fe.appendChild(o);});
}

// ── 테이블 렌더 ──
function render(){
  const q=document.getElementById('q').value.toLowerCase();
  const fs=document.getElementById('fs').value;
  const fe=document.getElementById('fe').value;
  const filtered=members.filter(m=>{
    if(fs && getStatus(m)!==fs) return false;
    if(fe && m.salesExec!==fe) return false;
    if(q && !m.name.includes(q) && !m.phone.includes(q) && !m.id.toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById('fcount').textContent=`${filtered.length}명 표시`;

  const SLBL={active:'활성',paused:'일시중단',churned:'이탈',new:'신규'};
  const SCLS={active:'b-active',paused:'b-paused',churned:'b-churned',new:'b-active'};

  let html='';
  filtered.forEach(m=>{
    const st=getStatus(m);
    const last=m.rounds[m.rounds.length-1];
    const dday=getDday(m);
    const roundNum=m.rounds.length;

    let ddH='<span style="color:var(--text3)">—</span>';
    if(dday!==null){
      if(dday>7)       ddH=`<span class="dd dd-ok">D-${dday}</span>`;
      else if(dday>=0) ddH=`<span class="dd dd-warn">D-${dday}</span>`;
      else             ddH=`<span class="dd dd-over">D+${Math.abs(dday)}</span>`;
    }

    html+=`<tr class="mrow" onclick="openPopup('${m.id}')">
      <td class="td-round">${roundNum}회</td>
      <td class="td-id">${m.id}</td>
      <td class="td-name">${m.name}</td>
      <td>${m.pos}</td>
      <td>${m.salesExec}</td>
      <td>${last?fmt(last.s):'—'}</td>
      <td>${last?fmt(last.e):'—'}</td>
      <td>${ddH}</td>
      <td><span class="badge ${SCLS[st]}">${SLBL[st]}</span></td>
      <td onclick="event.stopPropagation()">
        <button class="btn-pay" onclick="openPopupTab('${m.id}','pay')">+ 납부</button>
      </td>
    </tr>`;
  });

  document.getElementById('tb').innerHTML=html||`<tr><td colspan="10" style="text-align:center;padding:32px;color:var(--text3)">검색 결과가 없습니다.</td></tr>`;
}

let currentPopupId=null;
let currentTab='info';

function openPopup(id, tab='info'){
  currentPopupId=id; currentTab=tab;
  renderPopup();
  document.getElementById('popupOverlay').classList.add('open');
  document.addEventListener('keydown', onEsc);
}
function openPopupTab(id, tab){ openPopup(id, tab); }
function closePopup(){
  document.getElementById('popupOverlay').classList.remove('open');
  document.removeEventListener('keydown', onEsc);
  currentPopupId=null;
}
function closePopupOutside(e){ if(e.target===document.getElementById('popupOverlay')) closePopup(); }
function onEsc(e){ if(e.key==='Escape') closePopup(); }

function renderPopup(){
  const m=members.find(x=>x.id===currentPopupId);
  if(!m) return;
  const st=getStatus(m);
  const SLBL={active:'활성',paused:'일시중단',churned:'이탈',new:'신규'};
  const SCLS={active:'b-active',paused:'b-paused',churned:'b-churned',new:'b-active'};
  const dday=getDday(m);

  // 헤더
  document.getElementById('popupHead').innerHTML=`
    <div class="popup-avatar">${m.name[0]}</div>
    <div style="flex:1">
      <div class="popup-name">${m.name}</div>
      <div class="popup-meta">${m.id} · ${m.pos} · ${m.region} · ${m.phone}</div>
    </div>
    <div class="popup-status">
      <span class="badge ${SCLS[st]}">${SLBL[st]}</span>
      ${dday!==null?(dday>7?`<span class="dd dd-ok">D-${dday}</span>`:dday>=0?`<span class="dd dd-warn">D-${dday}</span>`:`<span class="dd dd-over">D+${Math.abs(dday)}</span>`):''}
    </div>
    <button class="popup-close" onclick="closePopup()">✕</button>`;

  // 탭 버튼
  const tabs=[['info','기본 정보'],['history','납부 이력'],['tasks','업무 할 일'],['pay','회비 납부 등록']];
  const tabHtml=`<div style="display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:12px">
    ${tabs.map(([k,l])=>`<button onclick="switchTab('${k}')" style="padding:5px 14px;border-radius:6px;border:1px solid ${currentTab===k?'rgba(201,168,76,.4)':'var(--border)'};background:${currentTab===k?'var(--gold-dim)':'transparent'};color:${currentTab===k?'var(--gold-light)':'var(--text3)'};font-family:'Pretendard',sans-serif;font-size:12px;font-weight:${currentTab===k?'600':'400'};cursor:pointer;transition:all .15s">${l}</button>`).join('')}
  </div>`;

  // 탭 내용
  let bodyContent='';
  if(currentTab==='info'){
    bodyContent=`
      <div class="psec-title">기본 정보</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">고객번호</div><div class="info-val gold">${m.id}</div></div>
        <div class="info-item"><div class="info-label">고객명</div><div class="info-val">${m.name}</div></div>
        <div class="info-item"><div class="info-label">직급</div><div class="info-val">${m.pos}</div></div>
        <div class="info-item"><div class="info-label">연락처</div><div class="info-val">${m.phone}</div></div>
        <div class="info-item"><div class="info-label">지역</div><div class="info-val">${m.region}</div></div>
        <div class="info-item"><div class="info-label">가입경로</div><div class="info-val">${m.joinPath}</div></div>
      </div>
      <div class="divider" style="margin:14px 0"></div>
      <div class="psec-title">담당 파트</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">담당 실행파트</div><div class="info-val">${m.salesExec}</div></div>
        <div class="info-item"><div class="info-label">담당 운영파트</div><div class="info-val">${m.opsExec}</div></div>
        <div class="info-item"><div class="info-label">담당 컨설턴트</div><div class="info-val">${m.consultant}</div></div>
      </div>
      <div class="divider" style="margin:14px 0"></div>
      <div class="psec-title">납부 설정</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">정기출금일</div><div class="info-val gold">매월 ${m.day}일</div></div>
        <div class="info-item"><div class="info-label">출금 방식</div><div class="info-val">${m.pay}</div></div>
        <div class="info-item"><div class="info-label">총 납부 회차</div><div class="info-val gold">${m.rounds.length}회</div></div>
      </div>`;
  } else if(currentTab==='history'){
    const rows=m.rounds.map((r,i)=>{
      const isCur=i===m.rounds.length-1; const ed=new Date(r.e);
      const rSt=m.churned&&isCur?'<span class="badge b-churned" style="font-size:10px;padding:2px 7px">이탈</span>':
        isCur&&ed>=TODAY?'<span class="badge b-active" style="font-size:10px;padding:2px 7px">진행중</span>':
        isCur?'<span class="badge b-paused" style="font-size:10px;padding:2px 7px">만료</span>':
        '<span style="font-size:11px;color:var(--text3)">완료</span>';
      return`<tr><td style="color:var(--text);font-weight:600">${r.n}회차</td><td>${fmt(r.pd)}</td><td>${fmt(r.s)}</td><td>${fmt(r.e)}</td><td style="color:var(--gold-light);font-weight:500">₩550,000</td><td>${rSt}</td></tr>`;
    }).join('');
    bodyContent=`
      <div class="psec-title">납부 이력 (총 ${m.rounds.length}회)</div>
      <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden">
        <table class="htbl"><thead><tr><th>회차</th><th>납부일</th><th>시작일</th><th>종료일</th><th>결제금액</th><th>상태</th></tr></thead>
        <tbody>${rows}</tbody></table>
      </div>`;
  } else if(currentTab==='tasks'){
    const tasks=getTasks(m);
    const taskRows=tasks.map(t=>`
      <div class="task-row ${t.cls}">
        <span class="task-badge">${t.prefix}</span>
        <span class="task-text">${t.label}</span>
        <span class="task-who">${t.who}</span>
        <span class="task-date">${fmt(t.due.toISOString().split('T')[0])}</span>
      </div>`).join('');
    bodyContent=`
      <div class="psec-title">업무 할 일 — ${m.rounds.length}회차 기준 (${fmt(m.rounds[m.rounds.length-1]?.s)} 시작)</div>
      <div class="tasks">${taskRows}</div>
      <div style="margin-top:12px;padding:10px 12px;background:var(--bg4);border-radius:8px;font-size:11px;color:var(--text3);line-height:1.7">
        💡 업무 할 일은 회차 시작일 기준으로 자동 계산됩니다. 납부 등록 시 다음 회차로 자동 갱신돼요.
      </div>`;
  } else if(currentTab==='pay'){
    const nextN=m.rounds.length+1;
    const ns=getNextStart(m); const ne=getNextEnd(ns);
    const todayStr=fmtFull(TODAY.toISOString());
    bodyContent=`
      <div class="psec-title">${nextN}회차 납부 등록</div>
      <div class="pay-form-wrap">
        <div class="pay-grid">
          <div class="form-field"><label>납부일</label><input type="date" id="fp-pd" value="${todayStr}"></div>
          <div class="form-field"><label>시작일</label><input type="date" id="fp-sd" value="${ns}" onchange="document.getElementById('fp-ed').value=getNextEnd(this.value)"></div>
          <div class="form-field"><label>종료일</label><input type="date" id="fp-ed" value="${ne}"></div>
        </div>
        <div class="pay-form-footer">
          <div style="font-size:12px;color:var(--text3)">결제금액 <strong style="color:var(--gold-light);font-size:13px">₩550,000</strong> (VAT 포함)</div>
          <button class="btn-sm btn-confirm" onclick="confirmPay('${m.id}')">✓ 납부 확인</button>
        </div>
      </div>`;
  }

  document.getElementById('popupBody').innerHTML=tabHtml+bodyContent;

  // 푸터
  const footBtns=m.churned
    ? `<button class="btn-sm btn-reactivate" onclick="reactivate('${m.id}')">재활성화</button>`
    : `<button class="btn-sm btn-danger" onclick="markChurned('${m.id}')">이탈 처리</button>`;
  document.getElementById('popupFoot').innerHTML=`
    ${footBtns}
    <button class="btn-sm btn-confirm" onclick="switchTab('pay')">+ 회비 납부 등록</button>
    <button class="btn-sm" onclick="closePopup()">닫기</button>`;
}

function switchTab(tab){ currentTab=tab; renderPopup(); }

// ── 납부 / 이탈 / 재활성화 ──
function confirmPay(id){
  const m=members.find(x=>x.id===id);
  const pd=document.getElementById('fp-pd')?.value;
  const sd=document.getElementById('fp-sd')?.value;
  const ed=document.getElementById('fp-ed')?.value;
  if(!pd||!sd||!ed){ showToast('날짜를 모두 입력해주세요.'); return; }
  m.rounds.push({n:m.rounds.length+1,pd,s:sd,e:ed});
  m.churned=false; save(); renderStats(); render();
  currentTab='history'; renderPopup();
  showToast(`✓ ${m.name} ${m.rounds.length}회차 납부가 등록되었습니다.`);
}
function markChurned(id){
  if(!confirm('이탈 처리하시겠습니까?')) return;
  const m=members.find(x=>x.id===id); m.churned=true;
  save(); renderStats(); render(); closePopup();
  showToast(`${m.name} 이탈 처리되었습니다.`);
}
function reactivate(id){
  const m=members.find(x=>x.id===id); m.churned=false;
  save(); renderStats(); render(); closePopup();
  showToast(`${m.name} 재활성화되었습니다.`);
}

// ── 신규 회원 등록 ──
function openNewMemberForm(){
  const id=nextId();
  const todayStr=fmtFull(TODAY.toISOString());
  const endStr=getNextEnd(todayStr);
  const EXEC_OPTIONS=['기여운','이세호','조계현','최연진'].map(e=>`<option>${e}</option>`).join('');
  const OPS_OPTIONS=['김재영','최은정'].map(e=>`<option>${e}</option>`).join('');
  const CS_OPTIONS=['박나라','박민경','강아름','박경화','조승현','백선중'].map(e=>`<option>${e}</option>`).join('');

  // 팝업 재활용
  document.getElementById('popupHead').innerHTML=`
    <div class="popup-avatar" style="background:linear-gradient(135deg,#2d4a6c,#1a2e44)">＋</div>
    <div style="flex:1"><div class="popup-name">신규 회원 등록</div><div class="popup-meta">고객번호 자동 부여: ${id}</div></div>
    <button class="popup-close" onclick="closePopup()">✕</button>`;

  document.getElementById('popupBody').innerHTML=`
    <div class="psec-title">기본 정보</div>
    <div class="info-grid">
      <div class="form-field"><label>고객명 *</label><input type="text" id="nw-name" placeholder="이름 입력" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none"></div>
      <div class="form-field"><label>직급 *</label><input type="text" id="nw-pos" placeholder="팀장 / 본부장 / 실장 등" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none"></div>
      <div class="form-field"><label>연락처 *</label><input type="text" id="nw-phone" placeholder="010-0000-0000" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none"></div>
      <div class="form-field"><label>지역</label><input type="text" id="nw-region" placeholder="서울 / 부산 등" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none"></div>
      <div class="form-field"><label>가입경로</label><select id="nw-join" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none"><option>신규TM</option><option>기존TM</option><option>지인소개</option><option>기타</option></select></div>
    </div>
    <div class="divider" style="margin:14px 0"></div>
    <div class="psec-title">담당 파트</div>
    <div class="info-grid">
      <div class="form-field"><label>담당 실행파트 *</label><select id="nw-exec" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none">${EXEC_OPTIONS}</select></div>
      <div class="form-field"><label>담당 운영파트 *</label><select id="nw-ops" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none">${OPS_OPTIONS}</select></div>
      <div class="form-field"><label>담당 컨설턴트 *</label><select id="nw-cs" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none">${CS_OPTIONS}</select></div>
    </div>
    <div class="divider" style="margin:14px 0"></div>
    <div class="psec-title">최초 납부 정보</div>
    <div class="info-grid">
      <div class="form-field"><label>납부일 *</label><input type="date" id="nw-pd" value="${todayStr}" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none"></div>
      <div class="form-field"><label>시작일 *</label><input type="date" id="nw-sd" value="${todayStr}" onchange="document.getElementById('nw-ed').value=getNextEnd(this.value)" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none"></div>
      <div class="form-field"><label>종료일 *</label><input type="date" id="nw-ed" value="${endStr}" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none"></div>
      <div class="form-field"><label>정기출금일 (매월)</label><input type="number" id="nw-day" min="1" max="31" placeholder="예: 20" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none"></div>
      <div class="form-field"><label>출금 방식</label><select id="nw-pay" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none"><option>카드</option><option>계좌</option></select></div>
    </div>`;

  document.getElementById('popupFoot').innerHTML=`
    <button class="btn-sm" onclick="closePopup()">취소</button>
    <button class="btn-sm btn-confirm" onclick="saveNewMember('${id}')">✓ 등록 완료</button>`;

  document.getElementById('popupOverlay').classList.add('open');
  document.addEventListener('keydown', onEsc);
}

function saveNewMember(id){
  const name=document.getElementById('nw-name').value.trim();
  const pos=document.getElementById('nw-pos').value.trim();
  const phone=document.getElementById('nw-phone').value.trim();
  const pd=document.getElementById('nw-pd').value;
  const sd=document.getElementById('nw-sd').value;
  const ed=document.getElementById('nw-ed').value;
  if(!name||!pos||!phone||!pd||!sd||!ed){ showToast('필수 항목을 모두 입력해주세요.'); return; }
  const newM={
    id, name, pos, phone,
    region:document.getElementById('nw-region').value||'—',
    joinPath:document.getElementById('nw-join').value,
    salesExec:document.getElementById('nw-exec').value,
    opsExec:document.getElementById('nw-ops').value,
    consultant:document.getElementById('nw-cs').value,
    day:parseInt(document.getElementById('nw-day').value)||1,
    pay:document.getElementById('nw-pay').value,
    churned:false,
    rounds:[{n:1,pd,s:sd,e:ed}]
  };
  members.push(newM);
  save(); initFilters(); renderStats(); render(); closePopup();
  showToast(`✓ ${name} 회원이 등록되었습니다. (${id})`);
}

// ── 토스트 ──
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── 초기화 ──
function init(){ initFilters(); renderStats(); render(); }
</script>
</body>
</html>
