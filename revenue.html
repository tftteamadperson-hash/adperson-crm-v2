<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합 매출 관리 — 분양의신 CRM</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script>
(function(){
  var u=sessionStorage.getItem('crm_user');
  if(u){var uid=JSON.parse(u).id;if(localStorage.getItem('crm_light_'+uid)==='1')document.documentElement.setAttribute('data-theme','light');}
})();
</script>
<style>
:root{
  --bg:#080f1a;--bg2:#0d1623;--bg3:#111e30;--bg4:#162236;--bg5:#0a1828;
  --border:#1e3050;--border2:#2a3f60;
  --gold:#C9A84C;--gold-light:#F0D080;--gold-dim:rgba(201,168,76,.13);
  --text:#eaf0f8;--text2:#96aec8;--text3:#4d6480;
  --green:#2dd4a0;--red:#f06060;--blue:#5b9cf6;--purple:#a78bfa;--orange:#fb923c;
  --sidebar:220px;--radius:8px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px}

/* 사이드바 */
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto;scrollbar-width:none}
.sidebar::-webkit-scrollbar{display:none}
.sb-top{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo{height:28px;filter:drop-shadow(0 0 6px rgba(201,168,76,.4))}
.sb-brand{font-size:11px;font-weight:600;color:var(--gold-light);letter-spacing:.04em;line-height:1.3}
.sb-brand span{display:block;font-size:9px;font-weight:300;color:var(--text3)}
.sb-user{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1e4d8c,#0d2d5a);border:1.5px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--gold-light);flex-shrink:0;overflow:hidden}
.sb-av img{width:100%;height:100%;object-fit:cover}
.sb-uname{font-size:13px;font-weight:600}.sb-role{font-size:11px;color:var(--gold);font-weight:500}
.sb-nav{flex:1;padding:8px 0}
.sb-section{padding:10px 16px 4px;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.12em;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 16px;color:var(--text2);font-size:13px;cursor:pointer;transition:all .15s;border-left:2px solid transparent;text-decoration:none}
.sb-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.sb-item.active{background:var(--gold-dim);color:var(--gold-light);border-left-color:var(--gold);font-weight:600}
.sb-item .icon{font-size:14px;width:17px;text-align:center;flex-shrink:0}
.sb-coming{margin-left:auto;font-size:9px;color:var(--text3);background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px}
.sb-bottom{padding:10px 0;border-top:1px solid var(--border)}

/* 메인 */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.page-title{font-size:16px;font-weight:700}
.page-desc{font-size:12px;color:var(--text3);margin-top:1px}
.btn-new{background:var(--gold);color:#160d00;border:none;border-radius:6px;padding:9px 18px;font-family:'Pretendard',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-new:hover{background:var(--gold-light);transform:translateY(-1px)}

/* 요약 카드 */
.summary-row{display:flex;gap:10px;padding:14px 24px 0;flex-shrink:0}
.sum-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;flex:1;display:flex;flex-direction:column;gap:4px}
.sum-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em}
.sum-val{font-size:20px;font-weight:700;color:var(--text)}
.sum-sub{font-size:11px;color:var(--text3)}

/* 탭 + 필터바 */
.tab-filter-bar{display:flex;align-items:center;gap:8px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.tabs{display:flex;gap:0;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:3px;flex-shrink:0}
.tab{padding:6px 18px;border-radius:6px;font-family:'Pretendard',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .18s;border:none;background:transparent}
.tab.active{background:var(--bg2);color:var(--text);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.fdiv{width:1px;height:22px;background:var(--border);margin:0 4px}
.sw{position:relative;width:180px;flex-shrink:0}
.sw input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px 7px 28px;font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s}
.sw input:focus{border-color:rgba(201,168,76,.4)}
.sw input::placeholder{color:var(--text3)}
.si{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:11px;pointer-events:none}
.fsel{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text);outline:none;cursor:pointer;transition:border-color .2s}
.fsel:focus{border-color:rgba(201,168,76,.4)}
.rbtn{padding:7px 13px;border-radius:20px;background:none;border:1px solid var(--border);font-family:'Pretendard',sans-serif;font-size:12px;color:var(--text3);cursor:pointer;transition:all .18s}
.rbtn:hover{border-color:var(--gold);color:var(--gold)}
.tinfo{margin-left:auto;font-size:12px;color:var(--text3);white-space:nowrap}
.tinfo strong{color:var(--text2);font-weight:600}

/* 테이블 */
.table-wrap{flex:1;overflow:auto;padding:0 24px 20px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.table-wrap::-webkit-scrollbar{width:4px;height:4px}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
table{width:100%;border-collapse:collapse;min-width:900px}
thead th{position:sticky;top:0;z-index:10;background:var(--bg2);border-bottom:2px solid var(--border);padding:11px 12px;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;text-align:left}
thead th.right{text-align:right}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
tbody tr:hover{background:rgba(255,255,255,.025)}
tbody td{padding:12px 12px;font-size:13px;color:var(--text2);white-space:nowrap}
tbody td.right{text-align:right;font-weight:600}
.td-name{font-size:14px;font-weight:700;color:var(--text)}
.td-amt{font-size:14px;font-weight:700;color:var(--text)}
.td-reward{color:var(--green);font-weight:600}
.td-refund{color:var(--red);font-weight:600}

/* 배지 */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.b-bun{background:rgba(201,168,76,.15);color:var(--gold-light)}
.b-wan{background:rgba(45,212,160,.12);color:var(--green)}
.b-hog{background:rgba(91,156,246,.15);color:var(--blue)}
.b-lms{background:rgba(167,139,250,.15);color:var(--purple)}
.b-reward{background:rgba(45,212,160,.12);color:var(--green);border:1px solid rgba(45,212,160,.2)}
.b-mile{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.2)}

/* 빈 상태 */
.empty-row td{text-align:center;padding:48px;color:var(--text3);font-size:13px}

/* 상세 모달 */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(5px);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.mbg.on{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:580px;max-width:96vw;max-height:88vh;overflow-y:auto;padding:26px;transform:translateY(14px) scale(.98);transition:transform .35s ease;scrollbar-width:thin}
.mbg.on .modal{transform:none}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.modal::before{content:'';display:block;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin-bottom:20px;opacity:.5}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.modal-close{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:rgba(255,255,255,.12)}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mf{display:flex;flex-direction:column;gap:5px}
.mf.full{grid-column:1/-1}
.ml{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em}
.ml .req{color:var(--red);margin-left:2px}
.einput,.eselect,.etarea{font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 11px;outline:none;transition:border-color .2s;width:100%}
.einput:focus,.eselect:focus,.etarea:focus{border-color:rgba(201,168,76,.45)}
.einput::placeholder,.etarea::placeholder{color:var(--text3)}
.etarea{resize:none;height:68px;line-height:1.7}
.einput[readonly]{background:var(--bg4);color:var(--text2);cursor:default}

/* 리워드 미리보기 */
.reward-preview{grid-column:1/-1;background:var(--bg3);border:1px solid rgba(45,212,160,.2);border-radius:7px;padding:12px 16px;display:flex;align-items:center;gap:12px}
.reward-preview .rp-label{font-size:11px;font-weight:600;color:var(--text3)}
.reward-preview .rp-val{font-size:15px;font-weight:700;color:var(--green)}

/* 섹션 구분 */
.msec{grid-column:1/-1;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--border);margin-top:4px;display:flex;align-items:center;gap:6px}
.msec .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

.mfoot{display:flex;gap:8px;margin-top:20px;padding-top:14px;border-top:1px solid var(--border)}
.mcancel{flex:1;background:transparent;border:1px solid var(--border);border-radius:6px;padding:10px;font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text2);cursor:pointer}
.msubmit{flex:2;background:linear-gradient(135deg,var(--gold-light),var(--gold));color:#160d00;border:none;border-radius:6px;padding:10px;font-family:'Pretendard',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.mdel{font-family:'Pretendard',sans-serif;font-size:12px;padding:10px 14px;border-radius:6px;background:rgba(240,96,96,.1);border:1px solid rgba(240,96,96,.25);color:var(--red);cursor:pointer}

/* 라이트모드 */
[data-theme="light"]{--bg:#eef2f7;--bg2:#fff;--bg3:#e4eaf2;--bg4:#d8e2ee;--bg5:#f0f4f9;--border:#c0d0e0;--text:#0d1f36;--text2:#2a4060;--text3:#6080a0;--gold:#9a6800;--gold-light:#7a5200}
[data-theme="light"] .sidebar,[data-theme="light"] .sb-top,[data-theme="light"] .sb-user{background:#1a2a42 !important;border-color:#243858 !important}
[data-theme="light"] .sb-item{color:#a0bcd8 !important}
[data-theme="light"] .sb-item.active{background:rgba(201,168,76,.15) !important;color:var(--gold-light) !important}
[data-theme="light"] thead th{background:var(--bg2) !important}
[data-theme="light"] .btn-new{background:linear-gradient(135deg,#c8900a,#a07008) !important;color:#fff !important}
</style>
</head>
<body>

  <div class="sb-top">
    <img src="./logo-gold.png" class="sb-logo" alt="분양의신" onerror="this.style.display='none'">

  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:18px">💰</span>
      <div><div class="page-title">통합 매출 관리</div><div class="page-desc">실행파트 연계매출 · 운영파트 광고특전 집행 내역</div></div>

<script>
'use strict';

/* ── 라이트모드 ── */
function toggleLightMode(){
  var u=sessionStorage.getItem('crm_user'),uid=u?JSON.parse(u).id:'guest';
  var isLight=document.documentElement.getAttribute('data-theme')==='light';
  if(isLight){document.documentElement.removeAttribute('data-theme');localStorage.removeItem('crm_light_'+uid);}
  else{document.documentElement.setAttribute('data-theme','light');localStorage.setItem('crm_light_'+uid,'1');}
  var btn=document.getElementById('lightModeBtn');
  if(btn)btn.innerHTML=isLight?'<span class="icon">🌙</span>라이트 모드':'<span class="icon">☀️</span>다크 모드';
}
(function(){var btn=document.getElementById('lightModeBtn');if(btn&&document.documentElement.getAttribute('data-theme')==='light')btn.innerHTML='<span class="icon">☀️</span>다크 모드';})();

/* ── 세션 ── */
window.addEventListener('DOMContentLoaded',function(){
  var RANKS={adperson1:'본부장',adperson2:'팀장',adperson3:'파트장',adperson4:'메인',adperson5:'어쏘',adperson6:'어쏘',adperson7:'CX',adperson8:'어시',adperson9:'어시'};
  var ROLE_LABEL={admin:'관리자',exec:'실행파트',ops:'운영파트'};
  var ALLOWED=['adperson1','adperson2','adperson3','adperson8'];
  var u=sessionStorage.getItem('crm_user');
  if(!u){window.location.href='index.html';return;}
  var user=JSON.parse(u);
  var av=document.getElementById('sbUserAv'),nm=document.getElementById('sbUserName'),rl=document.getElementById('sbUserRole');
  if(nm)nm.textContent=user.name+(' '+(RANKS[user.id]||''));
  if(rl)rl.textContent=ROLE_LABEL[user.role]||'';
  if(av){var ph=sessionStorage.getItem('profile_photo_'+user.id);if(ph)av.innerHTML='<img src="'+ph+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';else av.textContent=user.name[0];}
  var menuEl=document.getElementById('menuAccessMgmt');
  if(menuEl&&ALLOWED.indexOf(user.id)===-1)menuEl.style.display='none';
});

/* ── 데이터 ── */
var RKEY='crm_sales_real', AKEY='crm_sales_adv';
function loadR(){try{var s=localStorage.getItem(RKEY);return s?JSON.parse(s):[];}catch(e){return [];}}
function loadA(){try{var s=localStorage.getItem(AKEY);return s?JSON.parse(s):[];}catch(e){return [];}}
function saveR(d){localStorage.setItem(RKEY,JSON.stringify(d));}
function saveA(d){localStorage.setItem(AKEY,JSON.stringify(d));}

var RDATA=loadR(), ADATA=loadA();

/* 더미 데이터 */
if(!RDATA.length){

/* ── 상태 ── */
var activeTab='real', editId=null;

/* ── 탭 ── */
function setTab(t){
  activeTab=t;
  document.getElementById('tab-real').classList.toggle('active',t==='real');
  document.getElementById('tab-adv').classList.toggle('active',t==='adv');
  buildExecFilter();doRender();
}

/* ── 담당자 필터 옵션 ── */
function buildExecFilter(){
  var sel=document.getElementById('filterExec');
  var opts=['<option value="">전체 담당자</option>'];
  if(activeTab==='real'){
    ['조계현','이세호','기여운','최연전'].forEach(function(n){opts.push('<option>'+n+'</option>');});
  } else {
    ['김재영','최은정'].forEach(function(n){opts.push('<option>'+n+'</option>');});
  }
  sel.innerHTML=opts.join('');
}

function resetFilter(){
  document.getElementById('searchInput').value='';
  document.getElementById('filterExec').value='';
  document.getElementById('filterMonth').value='';
  doRender();
}

/* ── 포맷 ── */
function won(n){return (Math.abs(n)||0).toLocaleString()+'원';}
function fmtDate(s){if(!s)return'—';var p=s.split('-');return p[1]+'/'+p[2];}
function monthOf(s){if(!s)return 0;return parseInt(s.split('-')[1])||0;}

/* ── 요약 ── */
function renderSummary(){
  var totalReal=RDATA.reduce(function(a,d){return a+(d.amount||0)-(d.refund||0);},0);
  var totalAdv=ADATA.reduce(function(a,d){return a+(d.amount||0);},0);
  var totalRewardR=RDATA.reduce(function(a,d){return a+(d.rewardAmt||0);},0);
  var totalRewardA=ADATA.reduce(function(a,d){return a+(d.reward||0);},0);
  document.getElementById('summaryRow').innerHTML=
    '<div class="sum-card"><div class="sum-label">전체 매출 합계</div><div class="sum-val" style="color:var(--gold-light)">'+(totalReal+totalAdv).toLocaleString()+'원</div><div class="sum-sub">실연집 + 운광집</div></div>'+
    '<div class="sum-card"><div class="sum-label">📈 실연집 총액</div><div class="sum-val">'+totalReal.toLocaleString()+'원</div><div class="sum-sub">'+RDATA.length+'건</div></div>'+
    '<div class="sum-card"><div class="sum-label">📣 운광집 총액</div><div class="sum-val">'+totalAdv.toLocaleString()+'원</div><div class="sum-sub">'+ADATA.length+'건</div></div>'+
    '<div class="sum-card"><div class="sum-label">🎁 리워드 적립 누적</div><div class="sum-val" style="color:var(--green)">'+(totalRewardR+totalRewardA).toLocaleString()+'원</div><div class="sum-sub">실연집+운광집 합산</div></div>';
}

/* ── 테이블 렌더 ── */
function doRender(){
  renderSummary();
  var q=document.getElementById('searchInput').value.toLowerCase();
  var exec=document.getElementById('filterExec').value;
  var mo=document.getElementById('filterMonth').value;
  var moNum=mo?parseInt(mo):0;

    var data=RDATA.filter(function(d){
      if(q&&d.name.toLowerCase().indexOf(q)<0)return false;
      if(exec&&d.exec!==exec)return false;
      if(moNum&&monthOf(d.date)!==moNum)return false;
      return true;
    });
    var total=data.reduce(function(a,d){return a+(d.amount||0)-(d.refund||0);},0);

/* ── 리워드 자동계산 ── */
function calcReward(type, product, amount, rewardChoice){
  if(type==='real'){
    // 분양회/완판트럭: 리워드5% or 마일리지10%
    if(rewardChoice==='reward') return Math.round(amount*0.05);
    if(rewardChoice==='mileage') return Math.round(amount*0.10);
    return 0;
  } else {
    if(product==='호갱노노') return Math.round(amount*0.05);
    if(product==='LMS') return Math.round(amount*0.15);
    return 0;
  }
}

          ['박경화','박민경','강아름','전정훈','박혜은','조승현','백선중','박나라'].map(function(v){return '<option'+(d&&d.consult===v?' selected':'')+'>'+v+'</option>';}).join('')+
        '</select>'+
      '</div>'+
      '<div class="msec full"><span class="dot" style="background:var(--green)"></span>리워드 · 정산</div>'+
      '<div class="reward-preview full" id="aRewardPreview">'+
        '<div><div class="rp-label">자동 계산 리워드</div><div class="rp-val" id="aRewardVal">'+(d&&d.reward?d.reward.toLocaleString():'0')+'원</div></div>'+
        '<div style="font-size:11px;color:var(--text3);margin-left:auto">호갱노노 5% · LMS 15%</div>'+
      '</div>'+
      '<div class="mf"><label class="ml">지급 분기</label>'+
        '<select class="eselect" id="a_quarter">'+
          ['1분기','2분기','3분기','4분기'].map(function(v){return '<option'+(d&&d.rewardQuarter===v?' selected':'')+'>'+v+'</option>';}).join('')+
        '</select>'+
      '</div>'+
      '<div class="mf"><label class="ml">입금일</label><input class="einput" id="a_payinDate" type="date" value="'+(d&&d.payinDate||'')+'"></div>'+
      '<div class="mf full"><label class="ml">비고</label><textarea class="etarea" id="a_note">'+(d&&d.note||'')+'</textarea></div>'+
      '</div>'+
      '<div class="mfoot">'+
        (isEdit?'<button class="mdel" onclick="deleteItem(\'adv\','+d.id+')">삭제</button>':'')+
        '<button class="mcancel" onclick="closeModal()">취소</button>'+
        '<button class="msubmit" onclick="submitAdv('+(isEdit?d.id:'null')+')">저장</button>'+
      '</div>';
  }
}

/* ── 리워드 미리보기 갱신 ── */
function updateRReward(){
  var amt=parseInt(document.getElementById('r_amount').value)||0;
  var type=document.getElementById('r_reward').value;
  var val=calcReward('real','',amt,type);
  var el=document.getElementById('rRewardVal');
  if(el)el.textContent=val.toLocaleString()+'원';
}
function updateAReward(){
  var amt=parseInt(document.getElementById('a_amount').value)||0;
  var prod=document.getElementById('a_product').value;
  var val=calcReward('adv',prod,amt,'');
  var el=document.getElementById('aRewardVal');
  if(el)el.textContent=val.toLocaleString()+'원';
}
function updateAMargin(){
  var total=parseInt(document.getElementById('a_amount').value)||0;
  var real=parseInt(document.getElementById('a_realAmount').value)||0;
  var el=document.getElementById('a_margin');
  if(el)el.value=total-real;
}

/* ── 저장 ── */
function submitReal(id){
  var date=document.getElementById('r_date').value;
  var name=document.getElementById('r_name').value.trim();
  var route=document.getElementById('r_route').value;
  var amount=parseInt(document.getElementById('r_amount').value)||0;
  if(!date||!name||!route||!amount){alert('결제일, 고객명, 계약경로, 집행금액은 필수입니다.');return;}
  var rewardChoice=document.getElementById('r_reward').value;
  var rewardAmt=calcReward('real','',amount,rewardChoice);
  var obj={
    date:date,name:name,rank:document.getElementById('r_rank').value,
    campaign:document.getElementById('r_campaign').value,route:route,amount:amount,
    vat:parseInt(document.getElementById('r_vat').value),
    refund:parseInt(document.getElementById('r_refund').value)||0,
    refundDate:document.getElementById('r_refundDate').value,
    exec:document.getElementById('r_exec').value,consult:document.getElementById('r_consult').value,
    reward:rewardChoice,rewardAmt:rewardAmt,
    rewardQuarter:document.getElementById('r_quarter').value,
    note:document.getElementById('r_note').value
  };
  if(id){var idx=RDATA.findIndex(function(x){return x.id===id;});RDATA[idx]=Object.assign({id:id},obj);}
  else{obj.id=Math.max.apply(null,RDATA.map(function(d){return d.id;}).concat([0]))+1;RDATA.unshift(obj);}
  saveR(RDATA); saveRewardData(); closeModal(); doRender();
}
function submitAdv(id){
  var sendDate=document.getElementById('a_sendDate').value;
  var name=document.getElementById('a_name').value.trim();
  var product=document.getElementById('a_product').value;
  var amount=parseInt(document.getElementById('a_amount').value)||0;
  if(!sendDate||!name||!product||!amount){alert('발송일, 고객명, 이용상품, 결제금액은 필수입니다.');return;}
  var reward=calcReward('adv',product,amount,'');
  var obj={
    sendDate:sendDate,name:name,rank:document.getElementById('a_rank').value,product:product,
    count:parseInt(document.getElementById('a_count').value)||0,amount:amount,
    payDate:document.getElementById('a_payDate').value,payMethod:document.getElementById('a_payMethod').value,
    realAmount:parseInt(document.getElementById('a_realAmount').value)||0,
    margin:parseInt(document.getElementById('a_margin').value)||0,
    ops:document.getElementById('a_ops').value,consult:document.getElementById('a_consult').value,
    reward:reward,rewardQuarter:document.getElementById('a_quarter').value,
    payinDate:document.getElementById('a_payinDate').value,
    note:document.getElementById('a_note').value
  };
  if(id){var idx=ADATA.findIndex(function(x){return x.id===id;});ADATA[idx]=Object.assign({id:id},obj);}
  else{obj.id=Math.max.apply(null,ADATA.map(function(d){return d.id;}).concat([0]))+1;ADATA.unshift(obj);}
  saveA(ADATA); saveRewardData(); closeModal(); doRender();
}
function deleteItem(type,id){
  if(!confirm('삭제하시겠습니까?'))return;
  if(type==='real'){RDATA=RDATA.filter(function(x){return x.id!==id;});saveR(RDATA);}
  else{ADATA=ADATA.filter(function(x){return x.id!==id;});saveA(ADATA);}
  saveRewardData(); closeModal(); doRender();
}

/* ── 리워드 데이터 저장 (리워드 페이지 연동용) ── */
function saveRewardData(){
  var all=[];
  RDATA.forEach(function(d){
    if(d.rewardAmt){all.push({source:'실연집',date:d.date,name:d.name,type:d.reward==='reward'?'리워드':'마일리지',amount:d.rewardAmt,quarter:d.rewardQuarter,product:d.route,exec:d.exec});}
  });
  ADATA.forEach(function(d){
    if(d.reward){all.push({source:'운광집',date:d.sendDate,name:d.name,type:'리워드',amount:d.reward,quarter:d.rewardQuarter,product:d.product,exec:d.ops});}
  });
  localStorage.setItem('crm_reward_data',JSON.stringify(all));
}

/* ── 초기 ── */
buildExecFilter();
doRender();
saveRewardData();
</script>
